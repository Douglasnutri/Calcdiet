                {/* WhatsApp + seta */}
                <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}
                  onClick={e=>e.stopPropagation()}>
                  {wa && (
                    <a href={`https://wa.me/${wa}`} target="_blank" rel="noopener noreferrer"
                      style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',
                        background:'#25d36618',border:'1px solid #25d36644',
                        borderRadius:8,color:'#25d366',fontSize:11,textDecoration:'none',fontWeight:600}}>
                      📱
                    </a>
                  )}
                  <span style={{color:G.muted,fontSize:16}}>›</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

const defaultPatient = () => ({
  id: Date.now(),
  nome: '', objetivo: '', nomeCardapio: '',
  peso: 70, altura: 170, dataNasc: '', sexo: 'M',
  gordura: 20, fa: 1.55,
  tmb_formula: 'mifflin',
  telefone: '', instagram: '',
  profissional: { nome: '', crn: '', contato: '', instagram: '' },
  meals: [],
  rec1: '', rec2: '',
});

function App() {
  const [patients, setPatients] = useState([defaultPatient()]);
  const [currentId, setCurrentId] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [showProf, setShowProf] = useState(false);
  const [customFoods, setCustomFoods] = useState([]);
  const [templates, setTemplates] = useState([]); // cardápios favoritos
  const [syncing, setSyncing] = useState(false);
  const [dbReady, setDbReady] = useState(false);

  // ── Sincronização em tempo real com Firebase ──
  useEffect(() => {
    const unsubs = [];

    const init = async () => {
      try {
        if (!db) db = window.__nutridb__;
        if (!db) throw new Error('Firebase não inicializado');

        // ── 1. Carrega pacientes da coleção 'pacientes' ──
        const lista = await FB.listarPacientes();
        if (lista.length > 0) {
          setPatients(lista);
          setCurrentId(lista[0]?.id || null);
        } else {
          // Banco vazio — cria paciente padrão
          const p = defaultPatient();
          await FB.salvarPaciente(p);
          setPatients([p]);
          setCurrentId(p.id);
        }

        // ── 2. Carrega alimentos customizados da coleção 'alimentos_db' ──
        const foods = await FB.listarAlimentos();
        if (foods.length > 0) setCustomFoods(foods);

        // ── 3. Carrega templates favoritos da coleção 'favoritos' ──
        const favs = await FB.listarFavoritos();
        if (favs.length > 0) setTemplates(favs);

        // ── 4. Libera o app ──
        setDbReady(true);

        // ── 5. Listeners em tempo real ──
        unsubs.push(FB.onPacientesSnapshot(list => {
          // Ignora update do Firebase se há um save local pendente (usuário digitando).
          // Quando o timer do save disparar, o Firebase vai confirmar e aí sim atualiza.
          if (saveTimer.current) return;
          if (list.length > 0) {
            setPatients(list);
            setCurrentId(prev => prev || list[0]?.id || null);
          }
        }));
        unsubs.push(FB.onAlimentosSnapshot(foods => setCustomFoods(foods)));
        unsubs.push(FB.onFavoritosSnapshot(favs => setTemplates(favs)));

      } catch (err) {
        console.error('Erro Firebase:', err);
        setDbReady(true);
      }
    };

    init();
    return () => unsubs.forEach(u => u && u());
  }, []);

  // fbSave genérico (ainda usado para settings/logo)
  const fbSave = async (collection, docId, data) => {
    setSyncing(true);
    try {
      if (!db) db = window.__nutridb__;
      if (db) await db.collection(collection).doc(docId).set(data);
    } catch(e) { console.error('fbSave error:', e); }
    finally { setSyncing(false); }
  };

  // Salva/remove alimento(s) na coleção alimentos_db
  const handleCustomFoodsChange = async (foods, opts = {}) => {
    setCustomFoods(foods);
    setSyncing(true);
    try {
      const { added, removed, batchAdd } = opts;
      if (removed) await FB.excluirAlimento(removed);
      if (added)   await FB.salvarAlimento(added);
      if (batchAdd?.length) {
        // salva em lotes de 500 (limite do Firestore batch)
        for (let i = 0; i < batchAdd.length; i += 400) {
          const chunk = batchAdd.slice(i, i + 400);
          const batch = db.batch();
          chunk.forEach(f => {
            const id = toDocId(f.nome);
            batch.set(db.collection('alimentos_db').doc(id), { ...f, _docId: id });
          });
          await batch.commit();
        }
      }
    } catch(e) { console.error('handleCustomFoodsChange error:', e); }
    finally { setSyncing(false); }
  };

  // Salva o cardápio atual como template favorito na coleção 'favoritos'
  const saveTemplate = async (nome) => {
    const t = {
      id: Date.now(),
      nome: nome.trim(),
      meals: JSON.parse(JSON.stringify(patient.meals)),
      rec1: patient.rec1 || '',
      rec2: patient.rec2 || '',
      savedAt: new Date().toLocaleDateString('pt-BR'),
    };
    // remove se já existia com esse nome
    const antigo = templates.find(x => x.nome === t.nome);
    if (antigo?._docId) await FB.excluirTemplate(antigo._docId);
    const docId = await FB.salvarTemplate(t);
    // o listener onFavoritosSnapshot atualiza o estado automaticamente
  };

  const deleteTemplate = async (id) => {
    const tpl = templates.find(t => t.id === id);
    if (tpl?._docId) await FB.excluirTemplate(tpl._docId);
    // listener atualiza o estado automaticamente
  };

  // Carrega um template: substitui refeições + recomendações, mantém dados do paciente
  const loadTemplate = (t) => {
    const freshMeals = t.meals.map(m => ({
      ...m,
      id: Date.now() + Math.random(),
      items: m.items.map(i => ({...i})),
    }));
    save({
      ...patient,
      meals: freshMeals,
      rec1: t.rec1 || '',
      rec2: t.rec2 || '',
    });
  };

  const patient = patients.find(p=>p.id===currentId) || patients[0];

  // Timer de debounce para salvar no Firebase
  const saveTimer = useRef(null);

  const save = useCallback((updated, immediate = false) => {
    // Atualiza estado React LOCALMENTE — sem tocar no Firebase ainda,
    // então não há re-render vindo do onSnapshot e o foco é preservado.
    setPatients(prev => prev.map(p => p.id === updated.id ? updated : p));

    if (saveTimer.current) clearTimeout(saveTimer.current);

    if (immediate) {
      // Ações estruturais (excluir, mover, toggle) salvam na hora
      setSyncing(true);
      FB.salvarPaciente(updated).finally(() => setSyncing(false));
    } else {
      // Digitação: aguarda 10s de inatividade antes de salvar no Firebase
      // Isso evita que o onSnapshot do Firebase dispare re-renders durante a digitação
      saveTimer.current = setTimeout(() => {
        setSyncing(true);
        FB.salvarPaciente(updated).finally(() => setSyncing(false));
      }, 10000);
    }
  }, []);

  const upd = (field, val) => save({...patient, [field]:val});
  const updProf = (field, val) => save({...patient, profissional:{...patient.profissional,[field]:val}});

  const idadePaciente = calcIdade(patient.dataNasc);
  const tmb = useMemo(() => patient.peso && patient.altura && patient.dataNasc
    ? calcTMB({peso:patient.peso,altura:patient.altura,dataNasc:patient.dataNasc,sexo:patient.sexo,gordura:patient.gordura,fa:patient.fa})
    : null, [patient.peso,patient.altura,patient.dataNasc,patient.sexo,patient.gordura,patient.fa]);

  const targetKcal = tmb ? tmb[patient.tmb_formula] || tmb.mifflin : 2000;

  const addMeal = () => save({...patient, meals:[...patient.meals, {id:Date.now(),nome:`Refeição ${patient.meals.length+1}`,items:[],incluirNoCalculo:true}]}, true);
  const updateMeal = (m) => save({...patient, meals:patient.meals.map(x=>x.id===m.id?m:x)});
  const deleteMeal = (id) => save({...patient, meals:patient.meals.filter(m=>m.id!==id)}, true);

  const moveMeal = (id, dir) => {
    const arr = [...patient.meals];
    const idx = arr.findIndex(m => m.id === id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= arr.length) return;
    const [removed] = arr.splice(idx, 1);
    arr.splice(newIdx, 0, removed);
    save({...patient, meals: arr});
  };

  const toggleMealCalc = (id) => {
    const meals = patient.meals.map(m =>
      m.id === id ? {...m, incluirNoCalculo: !(m.incluirNoCalculo ?? true)} : m
    );
    save({...patient, meals});
  };

  const addPatient = () => {
    const p = defaultPatient();
    setPatients(prev => [...prev, p]);
    setSyncing(true);
    FB.salvarPaciente(p).finally(() => setSyncing(false));
    setCurrentId(p.id);
  };
  const deletePatient = () => {
    if (patients.length<=1) return;
    const next = patients.filter(p=>p.id!==currentId);
    setPatients(next);
    setSyncing(true);
    FB.excluirPaciente(currentId).finally(() => setSyncing(false));
    setCurrentId(next[0].id);
  };

  // DebouncedInput: mantém estado local para não perder foco,
  // só salva no Firebase quando o usuário clica fora (onBlur)
  const DebouncedInput = ({ label, field, type='text', flex='1 1 120px', ...rest }) => {
    const [localVal, setLocalVal] = useState(patient[field] ?? '');

    // Sincroniza quando o paciente muda (troca de paciente ou carga do Firebase)
    useEffect(() => { setLocalVal(patient[field] ?? ''); }, [patient.id, patient[field]]);

    return (
      <div style={{display:'flex',flexDirection:'column',gap:4,flex}}>
        <label style={{fontSize:11,color:G.muted,fontWeight:500}}>{label}</label>
        <input
          type={type}
          value={localVal}
          onChange={e => setLocalVal(e.target.value)}
          onBlur={e => {
            const val = type === 'number' ? (parseFloat(e.target.value) || 0) : e.target.value;
            if (val !== patient[field]) upd(field, val);
          }}
          style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,
            borderRadius:8,color:G.text,fontSize:13,outline:'none'}}
          {...rest}
        />
      </div>
    );
  };

  const inp = (label, field, type='text', opts={}) =>
    <DebouncedInput key={field + patient.id} label={label} field={field} type={type} {...opts}/>;

  const FA_OPTS = [
    {v:1.2,l:'Sedentário (1.2)'},{v:1.375,l:'Pouco ativo (1.375)'},
    {v:1.55,l:'Mod. ativo (1.55)'},{v:1.725,l:'Muito ativo (1.725)'},{v:1.9,l:'Extremamente ativo (1.9)'}
  ];

  const TMB_FMLS = [
    {k:'mifflin',l:'Mifflin-St Jeor',desc:'Melhor para emagrecimento'},
    {k:'harris',l:'Harris-Benedict',desc:'Clássica, crescimento muscular'},
    {k:'tinsley_p',l:'Tinsley (peso)',desc:'Atletas (considera peso)'},
    {k:'tinsley_mlg',l:'Tinsley (MLG)',desc:'Atletas (considera MLG)'},
    {k:'cunningham',l:'Cunningham',desc:'Atletas (baixo % gordura)'},
  ];

  if (!dbReady) return (
    <div style={{minHeight:'100vh',background:G.bg,display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:16,fontFamily:'sans-serif'}}>
      <div style={{width:36,height:36,border:'3px solid #2a3050',borderTopColor:'#4ade80',
        borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:'#4ade80',fontSize:16,fontWeight:700}}>NutriPlan Pro</div>
      <div style={{color:'#7c85a2',fontSize:13}}>Conectando ao Firebase…</div>
    </div>
  );

  // ── MODO: sem paciente selecionado → Dashboard global ──
  const emModo = currentId !== null;

  // ── CONTEÚDO DO PRONTUÁRIO ──────────────────────────────────────────────────
  const ProntuarioContent = () => {
    switch(tab) {
      case 'cadastro': return (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
            <div style={{fontWeight:700,marginBottom:12,fontSize:13,color:G.accent}}>👤 Dados do Paciente</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inp('Nome','nome')}
              {inp('Objetivo','objetivo')}
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inp('Telefone / WhatsApp','telefone')}
              {inp('Instagram','instagram')}
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <div style={{display:'flex',flexDirection:'column',gap:4,flex:'1 1 140px'}}>
                <label style={{fontSize:11,color:G.muted,fontWeight:500}}>Data de Nascimento</label>
                <input type="date" value={patient.dataNasc||''} onChange={e=>upd('dataNasc',e.target.value)}
                  style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none'}}/>
                {patient.dataNasc && (
                  <span style={{fontSize:11,color:G.accent,marginTop:1}}>{idadePaciente} anos</span>
                )}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,flex:'1 1 100px'}}>
                <label style={{fontSize:11,color:G.muted}}>Sexo</label>
                <select value={patient.sexo} onChange={e=>upd('sexo',e.target.value)}
                  style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none'}}>
                  <option value="M">Masculino</option>
                  <option value="F">Feminino</option>
                </select>
              </div>
            </div>
          </div>
          <button onClick={deletePatient} disabled={patients.length<=1}
            style={{alignSelf:'flex-start',padding:'6px 14px',background:'none',border:`1px solid ${G.danger}`,borderRadius:8,color:G.danger,fontSize:12,cursor:'pointer',opacity:patients.length<=1?0.3:1}}>
            🗑 Excluir paciente
          </button>
        </div>
      );

      case 'avaliacao': return (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* Dados antropométricos */}
          <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
            <div style={{fontWeight:700,marginBottom:12,fontSize:13,color:G.accent}}>📏 Dados Antropométricos</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inp('Peso (kg)','peso','number')}
              {inp('Altura (cm)','altura','number')}
              {inp('% Gordura Corporal','gordura','number')}
            </div>
            {tmb && (
              <div style={{display:'flex',gap:12,marginTop:4,flexWrap:'wrap'}}>
                <div style={{padding:'8px 14px',background:`${G.accent}15`,borderRadius:8,border:`1px solid ${G.accent}30`}}>
                  <div style={{fontSize:10,color:G.muted}}>Massa Magra</div>
                  <div style={{fontWeight:700,color:G.accent,fontSize:15}}>{tmb.mlg}kg</div>
                </div>
                <div style={{padding:'8px 14px',background:`${G.warn}15`,borderRadius:8,border:`1px solid ${G.warn}30`}}>
                  <div style={{fontSize:10,color:G.muted}}>Massa Gorda</div>
                  <div style={{fontWeight:700,color:G.warn,fontSize:15}}>{tmb.mgorda}kg</div>
                </div>
              </div>
            )}
          </div>

          {/* Fator de atividade */}
          <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
            <div style={{fontWeight:700,marginBottom:12,fontSize:13,color:G.accent}}>🏃 Fator de Atividade (FA)</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:8,marginBottom:10}}>
              {FA_OPTS.map(o=>(
                <div key={o.v} onClick={()=>upd('fa',o.v)} style={{
                  padding:'10px 12px',borderRadius:8,cursor:'pointer',
                  border:`2px solid ${patient.fa===o.v?G.accent:G.border}`,
                  background:patient.fa===o.v?`${G.accent}15`:G.panel,
                  transition:'all .15s'}}>
                  <div style={{fontWeight:700,color:patient.fa===o.v?G.accent:G.text,fontSize:14}}>{o.v}</div>
                  <div style={{fontSize:11,color:G.muted,marginTop:2}}>{o.l.split('(')[0].trim()}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <label style={{fontSize:11,color:G.muted}}>Valor personalizado:</label>
              <input type="number" step="0.01" min="1" max="2.5" value={patient.fa}
                onChange={e=>upd('fa',parseFloat(e.target.value)||1)}
                style={{width:72,padding:'5px 8px',background:G.panel,border:`1px solid ${G.border}`,
                  borderRadius:6,color:G.text,fontSize:13,outline:'none'}}/>
            </div>
          </div>

          {/* Fórmulas TMB */}
          {tmb ? (
            <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
              <div style={{fontWeight:700,marginBottom:12,fontSize:13,color:G.accent}}>🔥 Taxa Metabólica Basal (GCD = TMB × FA)</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:10}}>
                {TMB_FMLS.map(f=>(
                  <div key={f.k} onClick={()=>upd('tmb_formula',f.k)} style={{
                    padding:12,borderRadius:10,border:`2px solid ${patient.tmb_formula===f.k?G.accent:G.border}`,
                    cursor:'pointer',background:patient.tmb_formula===f.k?`${G.accent}15`:G.panel,transition:'all .2s'}}>
                    <div style={{fontSize:11,color:G.muted,marginBottom:4}}>{f.l}</div>
                    <div style={{fontSize:22,fontWeight:900,color:patient.tmb_formula===f.k?G.accent:G.text}}>{tmb[f.k]}</div>
                    <div style={{fontSize:10,color:G.muted}}>kcal/dia</div>
                    <div style={{fontSize:10,color:G.muted,marginTop:4}}>{f.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:32,textAlign:'center',color:G.muted}}>
              <div style={{fontSize:24,marginBottom:8}}>⚠️</div>
              Preencha peso, altura e data de nascimento na aba Cadastro para calcular a TMB.
            </div>
          )}
        </div>
      );

      case 'planejamento': return (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <TemplatesBar templates={templates} hasMeals={patient.meals.length>0}
            onSave={saveTemplate} onLoad={loadTemplate} onDelete={deleteTemplate}/>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <label style={{fontSize:11,color:G.muted,fontWeight:500}}>Nome do Cardápio</label>
            <DebouncedInput key={"nomeCardapio"+patient.id}
              label=""
              field="nomeCardapio"
              flex="1 1 auto"
              placeholder={`Ex: Fase de Adaptação, Semana 1, Cutting… (padrão: "${patient.objetivo||'Planejamento alimentar'}")`}
              style={{padding:'8px 12px',background:G.card,border:`1px solid ${G.border}`,borderRadius:8,
                color:G.text,fontSize:13,outline:'none',width:'100%',boxSizing:'border-box'}}
            />
            <span style={{fontSize:10,color:G.muted}}>Este nome aparecerá no topo do relatório para o paciente.</span>
          </div>
          <div>
            <label style={{fontSize:11,color:G.muted,fontWeight:500}}>Recomendações iniciais</label>
            <textarea value={patient.rec1||''} onChange={e=>upd('rec1',e.target.value)} rows={3}
              placeholder="Orientações para o paciente…"
              style={{width:'100%',marginTop:4,padding:'10px 12px',background:G.card,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none',resize:'vertical',boxSizing:'border-box'}}/>
          </div>
          {patient.meals.map((m,idx)=>(
            <MealTable key={m.id} meal={m} onChange={updateMeal}
              onDelete={()=>deleteMeal(m.id)} onMoveUp={()=>moveMeal(m.id,-1)}
              onMoveDown={()=>moveMeal(m.id,+1)} onToggleCalc={()=>toggleMealCalc(m.id)}
              isFirst={idx===0} isLast={idx===patient.meals.length-1}
              weight={patient.peso} customFoods={customFoods}/>
          ))}
          <button onClick={addMeal}
            style={{padding:'10px',background:G.card,border:`1px dashed ${G.border}`,borderRadius:10,color:G.muted,cursor:'pointer',fontSize:13}}>
            + Adicionar Refeição
          </button>
          <div>
            <label style={{fontSize:11,color:G.muted,fontWeight:500}}>Recomendações adicionais</label>
            <textarea value={patient.rec2||''} onChange={e=>upd('rec2',e.target.value)} rows={3}
              placeholder="Orientações complementares…"
              style={{width:'100%',marginTop:4,padding:'10px 12px',background:G.card,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none',resize:'vertical',boxSizing:'border-box'}}/>
          </div>
        </div>
      );

      case 'resumo': return (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Summary meals={patient.meals} targetKcal={targetKcal} weight={patient.peso}/>
          {patient.meals.length>0 && (
            <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
              <div style={{fontWeight:700,color:G.text,marginBottom:12,fontSize:13}}>🗓 Distribuição por Refeição</div>
              <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
                <thead><tr style={{color:G.muted,borderBottom:`1px solid ${G.border}`}}>
                  <th style={{textAlign:'left',padding:'4px 0',fontWeight:500}}>Refeição</th>
                  <th style={{textAlign:'right',fontWeight:500}}>Kcal</th>
                  <th style={{textAlign:'right',fontWeight:500}}>Ptn(A)</th>
                  <th style={{textAlign:'right',fontWeight:500}}>Ptn(V)</th>
                  <th style={{textAlign:'right',fontWeight:500}}>Carb</th>
                  <th style={{textAlign:'right',fontWeight:500}}>Gord</th>
                  <th style={{textAlign:'right',fontWeight:500}}>Fibra</th>
                </tr></thead>
                <tbody>
                  {patient.meals.map(m=>{
                    const ativo=m.incluirNoCalculo!==false;
                    const t={kcal:0,ptn_a:0,ptn_v:0,carb:0,sat:0,poli:0,mono:0,fibra:0};
                    m.items.forEach(({food,qtd})=>{
                      t.kcal+=calcKcal(food,qtd);
                      ['ptn_a','ptn_v','carb','sat','poli','mono','fibra'].forEach(k=>t[k]+=calcNutriente(food,qtd,k));
                    });
                    return (
                      <tr key={m.id} style={{borderBottom:`1px solid ${G.border}30`,color:ativo?G.text:G.muted,opacity:ativo?1:0.5}}>
                        <td style={{padding:'5px 0'}}>{m.nome}{!ativo&&<span style={{fontSize:10,color:G.muted,marginLeft:6,fontStyle:'italic'}}>(ignorado)</span>}</td>
                        <td style={{textAlign:'right',color:ativo?G.accent:G.muted,fontWeight:600}}>{t.kcal.toFixed(0)}</td>
                        <td style={{textAlign:'right'}}>{t.ptn_a.toFixed(1)}g</td>
                        <td style={{textAlign:'right'}}>{t.ptn_v.toFixed(1)}g</td>
                        <td style={{textAlign:'right'}}>{t.carb.toFixed(1)}g</td>
                        <td style={{textAlign:'right'}}>{(t.sat+t.poli+t.mono).toFixed(1)}g</td>
                        <td style={{textAlign:'right'}}>{t.fibra.toFixed(1)}g</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          {patient.meals.length>0 && <PrintTemplate patient={patient} targetKcal={targetKcal}/>}
        </div>
      );

      default: return null;
    }
  };

  // ── SIDEBAR ITENS ───────────────────────────────────────────────────────────
  const SIDEBAR = [
    {k:'cadastro',  icon:'👤', label:'Cadastro'},
    {k:'avaliacao', icon:'📐', label:'Avaliação'},
    {k:'planejamento', icon:'🍽', label:'Planejamento'},
    {k:'resumo',    icon:'📊', label:'Resumo'},
  ];

  return (
    <div style={{minHeight:'100vh',background:G.bg,color:G.text,fontFamily:"'DM Sans',system-ui,sans-serif"}}>

      {/* ── TOPBAR ─────────────────────────────────────────────────────────── */}
      <div style={{background:G.panel,borderBottom:`1px solid ${G.border}`,padding:'0 20px',
        display:'flex',alignItems:'center',gap:12,height:52,position:'sticky',top:0,zIndex:60}}>

        {/* Logo ou botão voltar */}
        {emModo ? (
          <button onClick={()=>{ setCurrentId(null); setTab('dashboard'); }}
            style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',
              cursor:'pointer',color:G.muted,padding:'4px 8px',borderRadius:8,fontSize:13,
              transition:'color .15s'}}
            onMouseEnter={e=>e.currentTarget.style.color=G.accent}
            onMouseLeave={e=>e.currentTarget.style.color=G.muted}>
            <span style={{fontSize:18}}>←</span>
            <span style={{fontWeight:600}}>Pacientes</span>
          </button>
        ) : (
          <span style={{fontWeight:900,fontSize:16,background:G.grad,
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'-0.5px'}}>
            NutriPlan Pro
          </span>
        )}

        {/* Nome do paciente quando em modo prontuário */}
        {emModo && patient && (
          <div style={{display:'flex',alignItems:'center',gap:10,borderLeft:`1px solid ${G.border}`,paddingLeft:16}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:`${G.accent}30`,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:G.accent,fontWeight:700}}>
              {(patient.nome||'?')[0].toUpperCase()}
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:G.text,lineHeight:1.2}}>{patient.nome||'Novo Paciente'}</div>
              {patient.objetivo && <div style={{fontSize:11,color:G.muted}}>{patient.objetivo}</div>}
            </div>
          </div>
        )}

        <div style={{flex:1}}/>

        {/* Status sync */}
        {syncing ? (
          <span style={{fontSize:10,color:G.muted,display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:G.accent,display:'inline-block',animation:'pulse 1s infinite'}}/>
            salvando…
          </span>
        ) : dbReady && (
          <span style={{fontSize:10,color:G.accent}}>☁️</span>
        )}

        {/* Botão profissional + alimentos */}
        {!emModo && (
          <button onClick={()=>{ setCurrentId(null); setTab('foods'); }}
            style={{padding:'5px 12px',background:G.card,border:`1px solid ${G.border}`,borderRadius:6,color:G.muted,fontSize:12,cursor:'pointer'}}>
            🥦 Alimentos
          </button>
        )}
        <button onClick={()=>setShowProf(!showProf)}
          style={{padding:'5px 12px',background:G.card,border:`1px solid ${G.border}`,borderRadius:6,color:G.muted,fontSize:12,cursor:'pointer'}}>
          ⚙ Profissional
        </button>
      </div>

      {/* Modal profissional */}
      {showProf && (
        <div style={{position:'fixed',inset:0,background:'#000000aa',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:G.panel,borderRadius:16,padding:24,width:320,border:`1px solid ${G.border}`}}>
            <div style={{fontWeight:700,marginBottom:16}}>Dados do Profissional</div>
            {[{k:'nome',l:'Nome'},{k:'crn',l:'CRN'},{k:'contato',l:'Telefone / Contato'},{k:'instagram',l:'Instagram'}].map(({k,l})=>(
              <div key={k} style={{marginBottom:10}}>
                <label style={{fontSize:11,color:G.muted}}>{l}</label>
                <input value={patient?.profissional?.[k]||''} onChange={e=>updProf(k,e.target.value)}
                  style={{width:'100%',marginTop:4,padding:'7px 10px',background:G.card,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none',boxSizing:'border-box'}}/>
              </div>
            ))}
            <button onClick={()=>setShowProf(false)} style={{width:'100%',padding:'8px',background:G.accent,border:'none',borderRadius:8,fontWeight:700,color:'#0f1117',cursor:'pointer',marginTop:4}}>Fechar</button>
          </div>
        </div>
      )}

      {/* ── MODO DASHBOARD (nenhum paciente selecionado) ──────────────────── */}
      {!emModo && tab !== 'foods' && (
        <div style={{maxWidth:640,margin:'0 auto',padding:'24px 16px'}}>
          <Dashboard
            patients={patients}
            onSelectPatient={(id)=>{ setCurrentId(id); setTab('cadastro'); }}
            onAddPatient={addPatient}
          />
        </div>
      )}

      {/* ABA Alimentos (global, fora do prontuário) */}
      {!emModo && tab === 'foods' && (
        <div style={{maxWidth:960,margin:'0 auto',padding:'16px 12px'}}>
          <FoodManager customFoods={customFoods} onCustomFoodsChange={handleCustomFoodsChange}/>
        </div>
      )}

      {/* ── MODO PRONTUÁRIO (paciente selecionado) ───────────────────────── */}
      {emModo && (
        <div style={{display:'flex',minHeight:'calc(100vh - 52px)'}}>

          {/* Sidebar esquerda */}
          <div style={{
            width:200, flexShrink:0, background:G.panel,
            borderRight:`1px solid ${G.border}`,
            padding:'16px 0', position:'sticky', top:52, height:'calc(100vh - 52px)',
            overflowY:'auto', display:'flex', flexDirection:'column', gap:4,
          }}>
            {/* Avatar + nome compacto */}
            <div style={{padding:'0 16px 16px',borderBottom:`1px solid ${G.border}`,marginBottom:8}}>
              <div style={{width:44,height:44,borderRadius:'50%',
                background:`linear-gradient(135deg,${G.accent}40,${G.info}40)`,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:20,color:G.accent,fontWeight:900,marginBottom:8}}>
                {(patient.nome||'?')[0].toUpperCase()}
              </div>
              <div style={{fontSize:12,fontWeight:700,color:G.text,lineHeight:1.3}}>{patient.nome||'Novo Paciente'}</div>
              {patient.dataNasc && <div style={{fontSize:10,color:G.muted,marginTop:2}}>{idadePaciente} anos</div>}
              {patient.objetivo && <div style={{fontSize:10,color:G.muted,marginTop:1,fontStyle:'italic'}}>{patient.objetivo}</div>}
              {tmb && (
                <div style={{marginTop:8,padding:'6px 8px',background:`${G.accent}15`,borderRadius:6,border:`1px solid ${G.accent}30`}}>
                  <div style={{fontSize:9,color:G.muted,textTransform:'uppercase',letterSpacing:'0.5px'}}>GCD</div>
                  <div style={{fontSize:16,fontWeight:900,color:G.accent}}>{targetKcal} <span style={{fontSize:10,fontWeight:400}}>kcal</span></div>
                </div>
              )}
            </div>

            {/* Itens de navegação */}
            {SIDEBAR.map(item=>(
              <button key={item.k} onClick={()=>setTab(item.k)}
                style={{
                  display:'flex', alignItems:'center', gap:10,
                  padding:'10px 16px', background: tab===item.k ? `${G.accent}18` : 'transparent',
                  border:'none', borderLeft: tab===item.k ? `3px solid ${G.accent}` : '3px solid transparent',
                  color: tab===item.k ? G.accent : G.muted,
                  fontWeight: tab===item.k ? 700 : 400,
                  cursor:'pointer', fontSize:13, textAlign:'left', width:'100%',
                  transition:'all .15s',
                }}>
                <span style={{fontSize:16}}>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}

            {/* Atalho: TMB no planejamento */}
            {tab === 'planejamento' && tmb && (
              <div style={{margin:'8px 12px',padding:'8px 10px',background:G.card,borderRadius:8,border:`1px solid ${G.border}`}}>
                <div style={{fontSize:9,color:G.muted,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:4}}>Fórmulas TMB</div>
                {TMB_FMLS.map(f=>(
                  <div key={f.k} style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:2,
                    color: patient.tmb_formula===f.k ? G.accent : G.muted,fontWeight:patient.tmb_formula===f.k?700:400}}>
                    <span>{f.l.split('-')[0].trim()}</span>
                    <span>{tmb[f.k]}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Área de conteúdo */}
          <div style={{flex:1,padding:'20px 24px',overflowY:'auto',minWidth:0}}>
            <ProntuarioContent/>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
