// ─── CÁLCULOS ────────────────────────────────────────────────────────────────
// ─── CÁLCULO DE NUTRIENTES ────────────────────────────────────────────────────
// Suporta três modos:
//  1. unidade_base === 'un' + peso_por_unidade  → converte unidades em gramas antes do cálculo
//  2. unidade: true (legado)                    → valores já são por unidade (sem conversão)
//  3. padrão (g ou ml)                          → fator = qtd / 100

const resolverFator = (f, qtd) => {
  // Novo padrão: unidade_base + peso_por_unidade
  if (f.unidade_base === 'un' && f.peso_por_unidade) {
    // qtd = número de unidades; converte para gramas primeiro
    const gramas = qtd * f.peso_por_unidade;
    return gramas / 100;
  }
  // Legado: unidade:true → valores já são por unidade inteira, não escalar
  if (f.unidade) return 1;
  // Padrão: gramas ou ml
  return qtd / 100;
};

const calcKcal = (f, qtd) => {
  const fator = resolverFator(f, qtd);
  return ((f.ptn_a||0) + (f.ptn_v||0) + (f.carb||0)) * 4 * fator
       + ((f.sat||0) + (f.poli||0) + (f.mono||0)) * 9 * fator;
};

const calcNutriente = (f, qtd, key) => {
  const fator = resolverFator(f, qtd);
  return (f[key] || 0) * fator;
};

// Calcula idade em anos a partir de uma data no formato YYYY-MM-DD
const calcIdade = (dataNasc) => {
  if (!dataNasc) return 0;
  // Extrai partes direto da string para evitar problema de fuso horário
  const partes = dataNasc.split('-');
  if (partes.length < 3) return 0;
  const hoje = new Date();
  const anoNasc = parseInt(partes[0], 10);
  const mesNasc = parseInt(partes[1], 10) - 1; // 0-indexed
  const diaNasc = parseInt(partes[2], 10);
  let idade = hoje.getFullYear() - anoNasc;
  const m = hoje.getMonth() - mesNasc;
  if (m < 0 || (m === 0 && hoje.getDate() < diaNasc)) idade--;
  return Math.max(0, idade);
};

const calcTMB = (p) => {
  const { peso, altura, dataNasc, sexo, gordura, fa } = p;
  const idade = calcIdade(dataNasc);
  const mlg = peso * (1 - gordura / 100);
  let harris, mifflin, tinsley_p, tinsley_mlg, cunningham;
  if (sexo === 'M') {
    harris = 88.362 + 13.397 * peso + 4.799 * altura - 5.677 * idade;
    mifflin = 10 * peso + 6.25 * altura - 5 * idade + 5;
  } else {
    harris = 447.593 + 9.247 * peso + 3.098 * altura - 4.330 * idade;
    mifflin = 10 * peso + 6.25 * altura - 5 * idade - 161;
  }
  tinsley_p = 7.7 * peso + 1729;
  tinsley_mlg = 14.4 * mlg + 113 * (altura / 100) + 113;
  cunningham = 500 + 22 * mlg;
  return {
    harris: Math.round(harris * fa),
    mifflin: Math.round(mifflin * fa),
    tinsley_p: Math.round(tinsley_p * fa),
    tinsley_mlg: Math.round(tinsley_mlg * fa),
    cunningham: Math.round(cunningham * fa),
    mlg: Math.round(mlg * 10) / 10,
    mgorda: Math.round((peso - mlg) * 10) / 10,
  };
};

// Input de quantidade com estado local — evita perda de foco a cada tecla
const QtyInput = ({ value, onCommit }) => {
  const [local, setLocal] = useState(String(value ?? ''));
  useEffect(() => { setLocal(String(value ?? '')); }, [value]);
  return (
    <input
      type="number" min="0" step="any"
      value={local}
      onChange={e => setLocal(e.target.value)}
      onBlur={() => {
        const val = parseFloat(local);
        if (!isNaN(val) && val >= 0 && val !== value) onCommit(val);
        else setLocal(String(value ?? ''));
      }}
      onKeyDown={e => {
        if (e.key === 'Enter') e.currentTarget.blur();
      }}
      style={{width:54,padding:'3px 6px',background:G.panel,
        border:`1px solid ${G.border}`,borderRadius:6,
        color:G.text,fontSize:12,outline:'none',textAlign:'right'}}
    />
  );
};

const FoodSearch = React.memo(({ onAdd, allFoods }) => {
  const foodList = allFoods || FOODS_RAW;
  const [query, setQuery]       = useState('');
  const [open, setOpen]         = useState(false);
  const [highlighted, setHigh]  = useState(-1);   // índice destacado no dropdown
  const [qtd, setQtd]           = useState('');
  const [sel, setSel]           = useState(null);
  const wrapRef   = useRef();   // div externa (fecha ao clicar fora)
const inputRef  = useRef();   // input de busca
const qtdRef    = useRef();   // input de quantidade
const listRef   = useRef();   // div da lista (para scroll automático)
const pendingSearchFocusRef = useRef(false); // refoca a busca após adicionar

  const results = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return foodList.filter(f => {
      const n = f.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      return n.includes(q);
    }).slice(0, 10);
  }, [query, foodList]);

  // Fecha dropdown ao clicar fora do componente inteiro
  useEffect(() => {
    const h = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  // Scroll automático para item destacado
  useEffect(() => {
    if (highlighted >= 0 && listRef.current) {
      const el = listRef.current.children[highlighted];
      if (el) el.scrollIntoView({ block: 'nearest' });
    }
  }, [highlighted]);

  const focusSearchInput = useCallback(() => {
  const focusOnce = () => {
    const el = inputRef.current;
    if (!el) return;
    el.focus({ preventScroll: true });
    if (document.activeElement === el) {
      el.setSelectionRange(el.value.length, el.value.length);
    }
  };

  // Tenta focar agora e também após o navegador/React concluírem o ciclo do Enter/Tab.
  focusOnce();
  requestAnimationFrame(focusOnce);
  setTimeout(focusOnce, 0);
  setTimeout(focusOnce, 80);
}, []);

useLayoutEffect(() => {
  if (!pendingSearchFocusRef.current) return;
  pendingSearchFocusRef.current = false;
  focusSearchInput();
}, [query, sel, qtd, open, focusSearchInput]);

  const add = useCallback(() => {
  if (!sel) return;
  const parsedQtd = parseFloat(qtd) || (sel.unidade || sel.unidade_base === 'un' ? 1 : 100);
  pendingSearchFocusRef.current = true;
  // Chama onAdd (estável graças ao useCallback+refs no MealTable)
  onAdd({ food: sel, qtd: parsedQtd });
  // Limpa estado local; o useEffect acima devolve o foco após o React aplicar o estado
  setQuery(''); setSel(null); setQtd(''); setOpen(false); setHigh(-1);
  focusSearchInput();
}, [sel, qtd, onAdd, focusSearchInput]);

  // Navegação por teclado no input de busca
  const handleSearchKey = (e) => {
    if (!open || results.length === 0) {
      if (e.key === 'ArrowDown') { setOpen(true); setHigh(0); e.preventDefault(); }
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setHigh(h => Math.min(h + 1, results.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setHigh(h => Math.max(h - 1, 0));
    } else if (e.key === 'Enter' || e.key === 'Tab') {
      if (highlighted >= 0 && results[highlighted]) {
        e.preventDefault();
        choose(results[highlighted]);
      } else if (results.length > 0) {
        // Nenhum destacado → pega o primeiro
        e.preventDefault();
        choose(results[0]);
      }
    } else if (e.key === 'Escape') {
      setOpen(false); setHigh(-1);
    }
  };

  // Enter/Tab no campo de quantidade → adiciona o alimento
 const handleQtdKey = (e) => {
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    e.stopPropagation();
    if (sel) add();
  }
};

  return (
    <div ref={wrapRef} style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>

      {/* ── Campo de busca com dropdown ── */}
      <div style={{position:'relative',flex:'1 1 200px',minWidth:180}}>
        <input
          ref={inputRef}
          value={query}
          onChange={e => { setQuery(e.target.value); setOpen(true); setSel(null); setHigh(-1); }}
          onFocus={() => { if (query.trim()) setOpen(true); }}
          onKeyDown={handleSearchKey}
          placeholder="Buscar alimento… (↑↓ navegar, Enter selecionar)"
          autoComplete="off"
          style={{width:'100%',padding:'8px 12px',background:G.card,
            border:`1px solid ${open && results.length ? G.accent : G.border}`,
            borderRadius:8,color:G.text,fontSize:13,outline:'none',
            boxSizing:'border-box',transition:'border-color .15s'}}
        />

        {/* Dropdown */}
        {open && results.length > 0 && (
          <div ref={listRef} style={{
            position:'absolute',top:'calc(100% + 4px)',left:0,right:0,
            background:G.panel,border:`1px solid ${G.accent}55`,
            borderRadius:8,zIndex:9999,maxHeight:240,overflowY:'auto',
            boxShadow:'0 12px 40px #00000088',
          }}>
            {results.map((f, i) => (
              <div
                key={i}
                onMouseDown={e => { e.preventDefault(); choose(f); }} // preventDefault evita blur no input
                onMouseEnter={() => setHigh(i)}
                style={{
                  padding:'8px 12px',cursor:'pointer',fontSize:13,
                  color: i === highlighted ? '#0f1117' : G.text,
                  background: i === highlighted ? G.accent : 'transparent',
                  borderBottom:`1px solid ${G.border}30`,
                  display:'flex',justifyContent:'space-between',alignItems:'center',
                  transition:'background .1s',
                }}
              >
                <span style={{fontWeight: i === highlighted ? 700 : 400}}>{f.nome}</span>
                <span style={{
                  fontSize:11,
                  color: i === highlighted ? '#0f1117aa' : G.muted,
                  marginLeft:8,
                }}>{f.medida}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── Quantidade ── */}
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <input
          ref={qtdRef}
          value={qtd}
          onChange={e => setQtd(e.target.value)}
          onKeyDown={handleQtdKey}
          type="number"
          min="0"
          placeholder={sel?.unidade ? 'Un.' : 'g'}
          style={{width:72,padding:'8px 10px',background:G.card,
            border:`1px solid ${G.border}`,borderRadius:8,
            color:G.text,fontSize:13,outline:'none'}}
        />
        <span style={{color:G.muted,fontSize:12,minWidth:16}}>{(sel?.unidade||sel?.unidade_base==='un') ? 'un.' : (sel?.unidade_base||'g')}</span>
      </div>

      {/* ── Botão adicionar ── */}
      <button
        onClick={add}
        disabled={!sel || !qtd}
        style={{padding:'8px 18px',background:G.accent,color:'#0f1117',borderRadius:8,
          border:'none',fontWeight:700,fontSize:13,
          cursor: sel && qtd ? 'pointer' : 'not-allowed',
          opacity: sel && qtd ? 1 : 0.4,
          transition:'opacity .15s'}}
      >
        + Adicionar
      </button>
    </div>
  );
});

// Tabela de uma refeição
const MealTable = ({ meal, onChange, onDelete, onMoveUp, onMoveDown, onToggleCalc, weight, customFoods, isFirst, isLast }) => {
  const allFoods = useMemo(() => [...FOODS_RAW, ...(customFoods||[])], [customFoods]);
  const [name, setName] = useState(meal.nome);

  // Refs sempre atualizadas mas sem disparar re-render —
  // isso permite que handleAddItem tenha referência estável ([] deps)
  // enquanto ainda acessa o meal e onChange mais recentes.
  const mealRef     = useRef(meal);
  const onChangeRef = useRef(onChange);
  useEffect(() => { mealRef.current = meal; },     [meal]);
  useEffect(() => { onChangeRef.current = onChange; }, [onChange]);

  // Referência ESTÁVEL — nunca muda, então React.memo do FoodSearch
  // não re-renderiza após adicionar um alimento.
  const handleAddItem = useCallback((item) => {
    const m = mealRef.current;
    onChangeRef.current({...m, items:[...m.items, item]});
  }, []); // [] = nunca recria

  const totals = useMemo(() => {
    const t = {kcal:0,ptn_a:0,ptn_v:0,carb:0,sat:0,poli:0,mono:0,fibra:0};
    meal.items.forEach(({food,qtd}) => {
      t.kcal += calcKcal(food,qtd);
      ['ptn_a','ptn_v','carb','sat','poli','mono','fibra'].forEach(k => t[k] += calcNutriente(food,qtd,k));
    });
    return t;
  }, [meal.items]);

  const removeItem = (idx) => {
    const items = meal.items.filter((_,i)=>i!==idx);
    onChange({...meal, items});
  };

  const ativo = meal.incluirNoCalculo ?? true;

  return (
    <div style={{
      background:G.card, borderRadius:12, marginBottom:12,
      border: ativo ? `1px solid ${G.border}` : `1px solid #3a3a4a`,
      opacity: ativo ? 1 : 0.55,
      transition: 'opacity .25s, border-color .25s',
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:G.panel,borderRadius:'12px 12px 0 0',gap:8}}>
        {/* Setas de reordenação */}
        <div style={{display:'flex',flexDirection:'column',gap:2}}>
          <button onClick={onMoveUp} disabled={isFirst}
            style={{background:'none',border:'none',color:isFirst?G.border:G.muted,cursor:isFirst?'default':'pointer',
              fontSize:12,padding:'1px 4px',lineHeight:1}}>▲</button>
          <button onClick={onMoveDown} disabled={isLast}
            style={{background:'none',border:'none',color:isLast?G.border:G.muted,cursor:isLast?'default':'pointer',
              fontSize:12,padding:'1px 4px',lineHeight:1}}>▼</button>
        </div>
        <input value={name} onChange={e=>{setName(e.target.value);onChange({...meal,nome:e.target.value});}}
          style={{background:'transparent',border:'none',color:G.text,fontSize:14,fontWeight:700,outline:'none',flex:1}}/>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {/* Toggle calcular no total */}
          <button onClick={onToggleCalc} title={ativo?'Remover do total':'Incluir no total'}
            style={{display:'flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:6,fontSize:11,
              border:`1px solid ${ativo ? G.accent : G.border}`,
              background: ativo ? `${G.accent}18` : 'transparent',
              color: ativo ? G.accent : G.muted, cursor:'pointer', fontWeight:600, whiteSpace:'nowrap'}}>
            <span style={{fontSize:13}}>{ativo ? '✓' : '○'}</span>
            {ativo ? 'No cálculo' : 'Ignorado'}
          </button>
          <span style={{color: ativo ? G.accent : G.muted, fontSize:13,fontWeight:600}}>
            {totals.kcal.toFixed(0)} kcal
          </span>
          <button onClick={onDelete} style={{background:'none',border:'none',color:G.danger,cursor:'pointer',fontSize:16,padding:0}}>×</button>
        </div>
      </div>
      <div style={{padding:'10px 14px',position:'relative'}}>
        <FoodSearch onAdd={handleAddItem} allFoods={allFoods}/>
        {meal.items.length > 0 && (
          <table style={{width:'100%',marginTop:12,borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{color:G.muted}}>
                <th style={{textAlign:'left',padding:'4px 6px',fontWeight:500}}>Alimento</th>
                <th style={{textAlign:'right',padding:'4px 6px',fontWeight:500}}>Qtd</th>
                <th style={{textAlign:'right',padding:'4px 6px',fontWeight:500}}>Kcal</th>
                <th style={{textAlign:'right',padding:'4px 6px',fontWeight:500}}>Ptn</th>
                <th style={{textAlign:'right',padding:'4px 6px',fontWeight:500}}>Carb</th>
                <th style={{textAlign:'right',padding:'4px 6px',fontWeight:500}}>Gord</th>
                <th style={{padding:'4px 6px'}}></th>
              </tr>
            </thead>
            <tbody>
              {meal.items.map((item,i) => {
                const k = calcKcal(item.food, item.qtd);
                const ptn = calcNutriente(item.food,item.qtd,'ptn_a') + calcNutriente(item.food,item.qtd,'ptn_v');
                const carb = calcNutriente(item.food,item.qtd,'carb');
                const gord = calcNutriente(item.food,item.qtd,'sat') + calcNutriente(item.food,item.qtd,'poli') + calcNutriente(item.food,item.qtd,'mono');
                const updateSub = (val) => {
                  const items = meal.items.map((it,idx) => idx===i ? {...it, sub: val} : it);
                  onChange({...meal, items});
                };
                return (
                  <tr key={i} style={{borderTop:`1px solid ${G.border}30`,color:G.text}}>
                    <td style={{padding:'5px 6px'}}>
                      <div style={{fontWeight:500}}>{item.food.nome}</div>
                      <input
                        value={item.sub || ''}
                        onChange={e => updateSub(e.target.value)}
                        placeholder="substituição… ex: ou macarrão 150g"
                        style={{marginTop:3,width:'100%',fontSize:11,padding:'2px 6px',
                          background:'transparent',border:`1px dashed ${G.border}`,
                          borderRadius:4,color:G.muted,outline:'none',
                          fontStyle:'italic'}}
                      />
                    </td>
                    <td style={{textAlign:'right',padding:'4px 6px',verticalAlign:'top'}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:3}}>
                        <QtyInput
                          value={item.qtd}
                          onCommit={val => {
                            const items = meal.items.map((it,idx) => idx===i ? {...it, qtd: val} : it);
                            onChange({...meal, items});
                          }}
                        />
                        <span style={{color:G.muted,fontSize:11}}>{(item.food.unidade||item.food.unidade_base==='un')?'un.':(item.food.unidade_base||'g')}</span>
                      </div>
                    </td>
                    <td style={{textAlign:'right',padding:'5px 6px',color:G.accent,verticalAlign:'top'}}>{k.toFixed(0)}</td>
                    <td style={{textAlign:'right',padding:'5px 6px',verticalAlign:'top'}}>{ptn.toFixed(1)}g</td>
                    <td style={{textAlign:'right',padding:'5px 6px',verticalAlign:'top'}}>{carb.toFixed(1)}g</td>
                    <td style={{textAlign:'right',padding:'5px 6px',verticalAlign:'top'}}>{gord.toFixed(1)}g</td>
                    <td style={{padding:'5px 6px',verticalAlign:'top'}}>
                      <button onClick={()=>removeItem(i)} style={{background:'none',border:'none',color:G.danger,cursor:'pointer',fontSize:14}}>×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{borderTop:`1px solid ${G.border}`,color:G.accent,fontWeight:700}}>
                <td style={{padding:'6px 6px'}}>Total</td>
                <td></td>
                <td style={{textAlign:'right',padding:'6px 6px'}}>{totals.kcal.toFixed(0)}</td>
                <td style={{textAlign:'right',padding:'6px 6px'}}>{(totals.ptn_a+totals.ptn_v).toFixed(1)}g</td>
                <td style={{textAlign:'right',padding:'6px 6px'}}>{totals.carb.toFixed(1)}g</td>
                <td style={{textAlign:'right',padding:'6px 6px'}}>{(totals.sat+totals.poli+totals.mono).toFixed(1)}g</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        )}
      </div>
    </div>
  );
};

// Resumo nutricional completo
const Summary = ({ meals, targetKcal, weight }) => {
  const totals = useMemo(() => {
    const t = {};
    const keys = ['kcal','ptn_a','ptn_v','carb','sat','poli','mono','fibra','ca','mg','mn','p','fe','na','k','cu','zn','vit_a','b1','b2','b6','b3','vit_c','se','vit_d','vit_e','b9'];
    keys.forEach(k => t[k] = 0);
    meals.filter(m => m.incluirNoCalculo !== false).forEach(m => m.items.forEach(({food,qtd}) => {
      t.kcal += calcKcal(food,qtd);
      keys.filter(k=>k!=='kcal').forEach(k => t[k] += calcNutriente(food,qtd,k));
    }));
    return t;
  }, [meals]);

  const ptn = totals.ptn_a + totals.ptn_v;
  const gord = totals.sat + totals.poli + totals.mono;
  const kcal = totals.kcal || 1;

  const macro = [
    {label:'Proteína Animal', g:totals.ptn_a, kcal_v: totals.ptn_a*4, pct: (totals.ptn_a*4/kcal*100), color:'#60a5fa'},
    {label:'Proteína Vegetal', g:totals.ptn_v, kcal_v: totals.ptn_v*4, pct: (totals.ptn_v*4/kcal*100), color:'#a78bfa'},
    {label:'Carboidrato', g:totals.carb, kcal_v: totals.carb*4, pct: (totals.carb*4/kcal*100), color:'#fbbf24'},
    {label:'Gord. Saturada', g:totals.sat, kcal_v: totals.sat*9, pct: (totals.sat*9/kcal*100), color:'#f87171'},
    {label:'Gord. Poliinsaturada', g:totals.poli, kcal_v: totals.poli*9, pct: (totals.poli*9/kcal*100), color:'#fb923c'},
    {label:'Gord. Monoinsaturada', g:totals.mono, kcal_v: totals.mono*9, pct: (totals.mono*9/kcal*100), color:'#34d399'},
  ];

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      {/* Macros */}
      <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
        <div style={{fontWeight:700,color:G.text,marginBottom:12,fontSize:13}}>📊 Macronutrientes</div>
        <div style={{textAlign:'center',marginBottom:12}}>
          <div style={{fontSize:28,fontWeight:900,background:G.grad,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
            {totals.kcal.toFixed(0)}
          </div>
          <div style={{color:G.muted,fontSize:12}}>kcal totais / meta: {targetKcal} kcal</div>
          {weight > 0 && <div style={{color:G.muted,fontSize:11,marginTop:2}}>{(totals.kcal/weight).toFixed(1)} kcal/kg · {(ptn/weight).toFixed(1)}g ptn/kg</div>}
        </div>
        <div style={{height:6,borderRadius:6,background:'#2a3050',marginBottom:16,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${Math.min(totals.kcal/targetKcal*100,100)}%`,background:G.grad,transition:'width .5s'}}/>
        </div>
        <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
          <thead><tr style={{color:G.muted}}>
            <th style={{textAlign:'left',padding:'3px 0',fontWeight:500}}>Nutriente</th>
            <th style={{textAlign:'right',fontWeight:500}}>g/dia</th>
            <th style={{textAlign:'right',fontWeight:500}}>%kcal</th>
            <th style={{textAlign:'right',fontWeight:500}}>kcal</th>
          </tr></thead>
          <tbody>
            {macro.map((m,i)=>(
              <tr key={i} style={{borderTop:`1px solid ${G.border}30`,color:G.text}}>
                <td style={{padding:'4px 0',display:'flex',alignItems:'center',gap:6}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:m.color,display:'inline-block'}}/>
                  {m.label}
                </td>
                <td style={{textAlign:'right',padding:'4px 0'}}>{m.g.toFixed(1)}</td>
                <td style={{textAlign:'right',padding:'4px 0',color:m.color}}>{m.pct.toFixed(1)}%</td>
                <td style={{textAlign:'right',padding:'4px 0'}}>{m.kcal_v.toFixed(0)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {/* Micronutrientes */}
      <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16,overflowY:'auto',maxHeight:380}}>
        <div style={{fontWeight:700,color:G.text,marginBottom:12,fontSize:13}}>💊 Micronutrientes (% IDR)</div>
        {[
          {k:'fibra',label:'Fibra',unit:'g'},{k:'ca',label:'Cálcio',unit:'mg'},{k:'mg',label:'Magnésio',unit:'mg'},
          {k:'p',label:'Fósforo',unit:'mg'},{k:'fe',label:'Ferro',unit:'mg'},{k:'na',label:'Sódio',unit:'mg'},
          {k:'k',label:'Potássio',unit:'mg'},{k:'zn',label:'Zinco',unit:'mg'},{k:'vit_a',label:'Vit A',unit:'mcg'},
          {k:'b1',label:'Vit B1',unit:'mg'},{k:'b2',label:'Vit B2',unit:'mg'},{k:'b6',label:'Vit B6',unit:'mg'},
          {k:'b3',label:'Vit B3',unit:'mg'},{k:'vit_c',label:'Vit C',unit:'mg'},{k:'se',label:'Selênio',unit:'mcg'},
          {k:'vit_d',label:'Vit D',unit:'mcg'},{k:'vit_e',label:'Vit E',unit:'mg'},{k:'b9',label:'Folato B9',unit:'mcg'},
        ].map(({k,label,unit})=>IDR[k]&&(
          <Badge key={k} v={totals[k]} max={IDR[k]} label={label} unit={unit}/>
        ))}
      </div>
    </div>
  );
};

// ─── APP PRINCIPAL ───────────────────────────────────────────────────────────
// ─── TEMPLATE DE IMPRESSÃO ───────────────────────────────────────────────────
// Replica fielmente o layout da aba "Template" da planilha original:
// - Nome do paciente centralizado, fonte 18px bold (igual à planilha)
// - Recomendações em laranja #E36C0A (cor exata da planilha)
// - Nome de cada refeição em negrito, sem fundo
// - Itens alternando entre #EBF1DE (verde-claro) e branco, como na planilha
// - Tabela nutricional com cabeçalho e dados em #C5D9F1 (azul-claro), igual ao Excel
// - Rodapé com dados do profissional
const PrintTemplate = ({ patient, targetKcal }) => {
  const printRef = useRef();
  const [logo, setLogo] = useState(() => localStorage.getItem('nutriplan_logo') || null);
  const [logoPos, setLogoPos] = useState(() => localStorage.getItem('nutriplan_logo_pos') || 'header');

  const handleLogoUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      setLogo(dataUrl);
      localStorage.setItem('nutriplan_logo', dataUrl);
      // Salva logo no Firebase também
      FB.set('nutriplan', 'settings', { logo: dataUrl, logoPos });
    };
    reader.readAsDataURL(file);
  };

  const removeLogo = () => {
    setLogo(null);
    localStorage.removeItem('nutriplan_logo');
    FB.set('nutriplan', 'settings', { logo: null, logoPos });
  };

  // Calcula totais gerais da dieta toda
  const totals = useMemo(() => {
    const t = {kcal:0,ptn_a:0,ptn_v:0,carb:0,sat:0,poli:0,mono:0,fibra:0,
               ca:0,mg:0,fe:0,na:0,k:0,zn:0,vit_a:0,b1:0,b2:0,b6:0,b3:0,vit_c:0,se:0,vit_d:0,vit_e:0,b9:0};
    patient.meals.filter(m => m.incluirNoCalculo !== false).forEach(m => m.items.forEach(({food,qtd}) => {
      t.kcal += calcKcal(food, qtd);
      Object.keys(t).filter(k=>k!=='kcal').forEach(k => t[k] += calcNutriente(food, qtd, k));
    }));
    return t;
  }, [patient.meals]);

  const kcal = totals.kcal || 1;
  const peso = patient.peso || 1;

  // Função para imprimir: abre o conteúdo numa janela nova com CSS de impressão
  const handlePrint = () => {
    const content = printRef.current.innerHTML;
    const win = window.open('', '_blank');
    win.document.write(`
      <!DOCTYPE html><html><head>
      <meta charset="UTF-8">
      <title>${patient.nomeCardapio || patient.objetivo || 'Plano Alimentar'} - ${patient.nome || 'Paciente'}</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; font-size: 10pt; color: #000; background: #fff; }
        @media print {
          body { margin: 1cm 1.5cm; }
          .meal-block {
            page-break-inside: avoid;
            break-inside: avoid;
          }
          .orientacoes-block {
            page-break-inside: avoid;
            break-inside: avoid;
          }
          table { page-break-inside: avoid; break-inside: avoid; }
        }
        table { border-collapse: collapse; width: 100%; }
        td, th { padding: 3px 6px; }
      </style>
      </head><body>${content}</body></html>
    `);
    win.document.close();
    win.focus();
    setTimeout(() => { win.print(); }, 300);
  };

  // Macros para a tabela nutricional (replicando colunas da planilha: g/dieta, %/kcal, kcal, g/kg)
  const ptnTotal = totals.ptn_a + totals.ptn_v;
  const gordTotal = totals.sat + totals.poli + totals.mono;
  const macroRows = [
    { label: 'Proteína (Total)',       g: ptnTotal,     kcalV: ptnTotal * 4,     bold: true },
    { label: 'Proteína (Animal)',      g: totals.ptn_a, kcalV: totals.ptn_a * 4, sub: true  },
    { label: 'Proteína (Vegetal)',     g: totals.ptn_v, kcalV: totals.ptn_v * 4, sub: true  },
    { label: 'Carboidrato',            g: totals.carb,  kcalV: totals.carb * 4,  bold: true },
    { label: 'Fibra',                  g: totals.fibra, kcalV: 0,                bold: true, noKcal: true },
    { label: 'Gordura Total',          g: gordTotal,    kcalV: gordTotal * 9,    bold: true },
    { label: 'Gordura Saturada',       g: totals.sat,   kcalV: totals.sat * 9,   sub: true  },
    { label: 'Gordura Polinsaturada',  g: totals.poli,  kcalV: totals.poli * 9,  sub: true  },
    { label: 'Gordura Monoinsaturada', g: totals.mono,  kcalV: totals.mono * 9,  sub: true  },
  ];

  // Cores exatas da planilha
  const COR_LINHA_PAR   = '#EBF1DE'; // verde-claro (linhas ímpares dos alimentos)
  const COR_TABELA      = '#C5D9F1'; // azul-claro (tabela nutricional)
  const COR_REC         = '#E36C0A'; // laranja (recomendações)
  const COR_HEADER_REF  = '#D7E4BC'; // verde médio (cabeçalho de refeição)

  return (
    <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
      {/* Cabeçalho da seção no app */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <div style={{fontWeight:700,fontSize:13,color:G.text}}>🖨 Template para Impressão</div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {/* Controles de logo */}
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {logo ? (
              <>
                <img src={logo} alt="logo" style={{height:32,borderRadius:4,border:`1px solid ${G.border}`,objectFit:'contain',background:'#fff',padding:2}}/>
                <select value={logoPos} onChange={e=>{setLogoPos(e.target.value);localStorage.setItem('nutriplan_logo_pos',e.target.value);FB.set('nutriplan','settings',{logo,logoPos:e.target.value});}}
                  style={{padding:'4px 8px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:6,color:G.text,fontSize:12,outline:'none'}}>
                  <option value="header">No cabeçalho</option>
                  <option value="footer">No rodapé</option>
                </select>
                <button onClick={removeLogo} style={{padding:'4px 8px',background:'none',border:`1px solid ${G.danger}`,borderRadius:6,color:G.danger,fontSize:12,cursor:'pointer'}}>
                  Remover
                </button>
              </>
            ) : (
              <label style={{padding:'5px 12px',background:G.card,border:`1px dashed ${G.border}`,borderRadius:6,color:G.muted,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                🖼 Adicionar logo
                <input type="file" accept="image/*" onChange={handleLogoUpload} style={{display:'none'}}/>
              </label>
            )}
          </div>
          <button onClick={handlePrint}
            style={{padding:'7px 18px',background:G.accent,border:'none',borderRadius:8,
                    color:'#0f1117',fontWeight:700,fontSize:13,cursor:'pointer',letterSpacing:'-0.3px'}}>
            Imprimir / Salvar PDF
          </button>
        </div>
      </div>

      {/* ── PRÉVIA — idêntica ao impresso ── */}
      <div ref={printRef} style={{
        background:'#fff', color:'#000', borderRadius:8,
        fontFamily:'Arial, sans-serif', fontSize:'10pt', lineHeight:1.5,
        border:`1px solid ${G.border}`,
        overflow:'hidden',
      }}>

        {/* ══ CABEÇALHO: logo à esquerda, dados profissional à direita ══ */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center',
          padding:'18px 10%', borderBottom:'2px solid #e0e0e0'}}>
          {/* Logo */}
          <div style={{minWidth:100}}>
            {logo ? (
              <img src={logo} alt="logo" style={{maxHeight:64,maxWidth:160,objectFit:'contain'}}/>
            ) : (
              <div style={{width:90,height:44,background:'#f5f5f5',borderRadius:4,
                display:'flex',alignItems:'center',justifyContent:'center',
                color:'#bbb',fontSize:'9pt'}}>sem logo</div>
            )}
          </div>
          {/* Dados profissional */}
          <div style={{textAlign:'right', fontSize:'9.5pt', color:'#333', lineHeight:1.8}}>
            {patient.profissional.nome && (
              <div style={{fontWeight:'bold', fontSize:'11pt'}}>{patient.profissional.nome}</div>
            )}
            {patient.profissional.crn && <div style={{color:'#555'}}>CRN {patient.profissional.crn}</div>}
            {patient.profissional.contato && <div style={{color:'#555'}}>{patient.profissional.contato}</div>}
            {patient.profissional.instagram && (
              <div style={{color:'#555'}}>
                @{patient.profissional.instagram.replace('@','')}
              </div>
            )}
          </div>
        </div>

        <div style={{padding:'24px 10%'}}>

          {/* ══ NOME DO PACIENTE ══ */}
          <div style={{textAlign:'center', marginBottom:patient.objetivo ? 4 : 16}}>
            <div style={{fontWeight:'bold', fontSize:'16pt'}}>
              {patient.nome || 'Paciente'}
            </div>
          </div>

          {/* ══ TÍTULO: nome do cardápio (ou objetivo como fallback) ══ */}
          {(patient.nomeCardapio || patient.objetivo) && (
            <div style={{textAlign:'center', marginBottom:16}}>
              <div style={{fontWeight:'bold', fontSize:'12pt', color:'#444'}}>
                {patient.nomeCardapio || patient.objetivo}
              </div>
              <div style={{fontSize:'9.5pt', color:'#777'}}>Planejamento alimentar</div>
            </div>
          )}

          {/* ══ ORIENTAÇÕES INICIAIS ══ */}
          {patient.rec1 && (
            <div className="orientacoes-block" style={{margin:'16px 0', padding:'14px 18px',
              background:'#f8f8f8', border:'1px solid #e0e0e0', borderRadius:6}}>
              <div style={{fontWeight:'bold', fontSize:'11pt', marginBottom:8}}>Orientações gerais</div>
              <div style={{fontSize:'9.5pt', color:'#333', whiteSpace:'pre-wrap', lineHeight:1.7}}>
                {patient.rec1}
              </div>
            </div>
          )}

// ─── FIREBASE HELPERS ────────────────────────────────────────────────────────
// db é preenchido pelo script Firebase que carrega antes do Babel
let db = window.__nutridb__ || null;
const setDb = (d) => { db = d; };

// Converte nome para snake_case — ID dos documentos do Firestore
const toDocId = (nome) =>
  nome.trim().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_|_$/g, '');

const FB = {
  // ── Operações genéricas ──
  async set(col, docId, data) {
    if (!db) db = window.__nutridb__;
    if (!db) return;
    await db.collection(col).doc(docId).set(data);
  },
  async get(col, docId) {
    if (!db) db = window.__nutridb__;
    if (!db) return null;
    const snap = await db.collection(col).doc(docId).get();
    return snap.exists ? snap.data() : null;
  },
  onSnapshot(col, docId, cb) {
    if (!db) db = window.__nutridb__;
    if (!db) return () => {};
    return db.collection(col).doc(docId).onSnapshot(snap => {
      if (snap.exists) cb(snap.data());
    });
  },

  // ── alimentos_db: documentos individuais por alimento ──
  async salvarAlimento(food) {
    if (!db) db = window.__nutridb__;
    if (!db) return;
    const id = toDocId(food.nome);
    await db.collection('alimentos_db').doc(id).set({ ...food, _id: id });
    return id;
  },
  async excluirAlimento(nome) {
    if (!db) db = window.__nutridb__;
    if (!db) return;
    await db.collection('alimentos_db').doc(toDocId(nome)).delete();
  },
  async listarAlimentos() {
    if (!db) db = window.__nutridb__;
    if (!db) return [];
    const snap = await db.collection('alimentos_db').get();
    return snap.docs.map(d => ({ ...d.data(), _docId: d.id }));
  },
  onAlimentosSnapshot(cb) {
    if (!db) db = window.__nutridb__;
    if (!db) return () => {};
    return db.collection('alimentos_db').onSnapshot(snap => {
      cb(snap.docs.map(d => ({ ...d.data(), _docId: d.id })));
    });
  },
  async buscarAlimentoPorNome(nome) {
    if (!db) db = window.__nutridb__;
    if (!db) return null;
    const snap = await db.collection('alimentos_db')
      .where('nome', '==', nome).limit(1).get();
    if (snap.empty) return null;
    return { ...snap.docs[0].data(), _docId: snap.docs[0].id };
  },

  // ── pacientes: coleção individual ──
  async salvarPaciente(patient) {
    if (!db) db = window.__nutridb__;
    if (!db) return;
    const id = String(patient.id);
    await db.collection('pacientes').doc(id).set(patient);
  },
  async excluirPaciente(id) {
    if (!db) db = window.__nutridb__;
    if (!db) return;
    await db.collection('pacientes').doc(String(id)).delete();
  },
  async listarPacientes() {
    if (!db) db = window.__nutridb__;
    if (!db) return [];
    const snap = await db.collection('pacientes').orderBy('nome').get();
    return snap.docs.map(d => d.data());
  },
  onPacientesSnapshot(cb) {
    if (!db) db = window.__nutridb__;
    if (!db) return () => {};
    return db.collection('pacientes').onSnapshot(snap => {
      cb(snap.docs.map(d => d.data()));
    });
  },

  // ── favoritos: templates de cardápio ──
  async salvarTemplate(template) {
    if (!db) db = window.__nutridb__;
    if (!db) return;
    const id = toDocId(template.nome) + '_' + template.id;
    await db.collection('favoritos').doc(id).set({ ...template, _docId: id });
    return id;
  },
  async excluirTemplate(docId) {
    if (!db) db = window.__nutridb__;
    if (!db) return;
    await db.collection('favoritos').doc(docId).delete();
  },
  onFavoritosSnapshot(cb) {
    if (!db) db = window.__nutridb__;
    if (!db) return () => {};
    return db.collection('favoritos').onSnapshot(snap => {
      cb(snap.docs.map(d => d.data()));
    });
  },
  async listarFavoritos() {
    if (!db) db = window.__nutridb__;
    if (!db) return [];
    const snap = await db.collection('favoritos').get();
    return snap.docs.map(d => d.data());
  },
};

// ─── SCRIPT DE MIGRAÇÃO (disponível via console: window.rodarMigracao()) ─────
window.rodarMigracao = async () => {
  console.log('Iniciando migração...');
  try {
    if (!db) db = window.__nutridb__;

    // ── Migra alimentos de nutriplan/customFoods → alimentos_db ──
    const foodsSnap = await db.collection('nutriplan').doc('customFoods').get();
    let alimentosMigrados = 0;
    if (foodsSnap.exists && foodsSnap.data()?.list) {
      const batch = db.batch();
      for (const food of foodsSnap.data().list) {
        const id = toDocId(food.nome);
        const ref = db.collection('alimentos_db').doc(id);
        batch.set(ref, {
          nome:            food.nome,
          unidade_base:    food.unidade_base    || (food.unidade ? 'un' : 'g'),
          peso_referencia: food.peso_por_unidade || 100,
          ptn_a:  food.ptn_a  || 0,  ptn_v: food.ptn_v || 0,
          carb:   food.carb   || 0,  sat:   food.sat   || 0,
          poli:   food.poli   || 0,  mono:  food.mono  || 0,
          fibra:  food.fibra  || 0,  ca:    food.ca    || 0,
          mg:     food.mg     || 0,  fe:    food.fe    || 0,
          na:     food.na     || 0,  k:     food.k     || 0,
          zn:     food.zn     || 0,  vit_a: food.vit_a || 0,
          b1:     food.b1     || 0,  b2:    food.b2    || 0,
          b6:     food.b6     || 0,  b3:    food.b3    || 0,
          vit_c:  food.vit_c  || 0,  se:    food.se    || 0,
          vit_d:  food.vit_d  || 0,  vit_e: food.vit_e || 0,
          b9:     food.b9     || 0,  _docId: id,
        });
        alimentosMigrados++;
      }
      await batch.commit();
    }

    // ── Migra pacientes de nutriplan/patients → coleção pacientes ──
    const pSnap = await db.collection('nutriplan').doc('patients').get();
    let pacientesMigrados = 0;
    if (pSnap.exists && pSnap.data()?.list) {
      const batch = db.batch();
      for (const p of pSnap.data().list) {
        batch.set(db.collection('pacientes').doc(String(p.id)), p);
        pacientesMigrados++;
      }
      await batch.commit();
    }

    // ── Migra templates de nutriplan/templates → coleção favoritos ──
    const tSnap = await db.collection('nutriplan').doc('templates').get();
    let templatesMigrados = 0;
    if (tSnap.exists && tSnap.data()?.list) {
      const batch = db.batch();
      for (const t of tSnap.data().list) {
        const id = toDocId(t.nome) + '_' + t.id;
        batch.set(db.collection('favoritos').doc(id), { ...t, _docId: id });
        templatesMigrados++;
      }
      await batch.commit();
    }

    const msg = `Migração concluída!\n• ${alimentosMigrados} alimentos → alimentos_db\n• ${pacientesMigrados} pacientes → pacientes\n• ${templatesMigrados} templates → favoritos`;
    console.log(msg);
    alert(msg);
  } catch (err) {
    console.error('Erro na migração:', err);
    alert('Erro: ' + err.message);
  }
};

    {k:'ptn_a',      l:'Proteína Animal (g)',  type:'number'},
    {k:'ptn_v',      l:'Proteína Vegetal (g)', type:'number'},

    {k:'fibra',      l:'Fibra (g)',             type:'number'},
    {k:'ca',         l:'Cálcio (mg)',            type:'number'},
    {k:'mg',         l:'Magnésio (mg)',          type:'number'},
    {k:'p',          l:'Fósforo (mg)',           type:'number'},

  ];

  const filtered = customFoods.filter(f =>
    f.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .includes(search.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''))
  );

  // Normaliza nome para comparação: sem acento, minúsculo, sem espaços duplos
  const normName = (n) => n.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');

  // Nomes já existentes: banco original + customFoods
  const existingNames = useMemo(() => {
    const allExisting = [...FOODS_RAW, ...customFoods];
    return new Set(allExisting.map(f => normName(f.nome)));
  }, [customFoods]);

  const [dupWarning, setDupWarning] = useState('');

  const saveForm = () => {
    if (!form.nome.trim()) return;
    const food = {...form};
    allFields.filter(f=>f.type==='number').forEach(f => { food[f.k] = parseFloat(food[f.k]) || 0; });

    // Verifica duplicata — ignora se estamos editando o mesmo item
    const norm = normName(food.nome);
    const isDup = customFoods.some((f, i) => i !== editIdx && normName(f.nome) === norm)
               || (editIdx === null && FOODS_RAW.some(f => normName(f.nome) === norm));

    if (isDup) {
      setDupWarning(`Já existe um alimento com o nome "${food.nome}" no banco de dados.`);
      return;
    }
    setDupWarning('');

    let updated;
    if (editIdx !== null) {
      const old = customFoods[editIdx];

      if (old?.nome && old.nome !== food.nome) {
        onCustomFoodsChange(
          customFoods.map((f,i) => i===editIdx ? food : f),
          { added: food, removed: old.nome }
        );

        onCustomFoodsChange(
          customFoods.map((f,i) => i===editIdx ? food : f),
          { added: food }
        );
      }
    } else {
      updated = [...customFoods, food];
      onCustomFoodsChange(updated, { added: food });
    }
    setForm(EMPTY_FOOD());
    setEditIdx(null);
    setMode('list');
  };

  const startEdit = (food, idx) => {
    setForm({...food});
    setEditIdx(idx);
    setMode('manual');
  };

  const deleteFood = (idx) => {
    const food = customFoods[idx];
    onCustomFoodsChange(customFoods.filter((_,i) => i!==idx), { removed: food?.nome });
    setDeleteConfirm(null);
  };

  // Normaliza qualquer formato de JSON para as chaves internas do sistema.
  // Aceita tanto o formato do sistema (nome, carb, sat...) quanto o formato
  // do CSV exportado da planilha (Nome, Carbs, Fat, Ptn (A), etc.)
  const normalizeFood = (f) => {
    // Mapa de chaves alternativas → chave interna
    const keyMap = {
      // Nome
      'Nome': 'nome', 'NOME': 'nome',
      // Medida
      'Medida': 'medida', 'MEDIDA': 'medida',
      // Proteínas
      'Ptn (A)': 'ptn_a', 'ptn_a': 'ptn_a',
      'Ptn (V)': 'ptn_v', 'ptn_v': 'ptn_v',
      // Carboidratos
      'Carbs': 'carb', 'Carb': 'carb', 'carb': 'carb', 'Carboidrato': 'carb',
      // Gorduras
      'Fat': 'sat', 'Sat': 'sat', 'sat': 'sat', 'Gordura Saturada': 'sat',
      'Poli': 'poli', 'poli': 'poli',
      'Mono': 'mono', 'mono': 'mono',
      // Fibra
      'Fibra': 'fibra', 'fibra': 'fibra',
      // Minerais
      'Cálcio': 'ca', 'ca': 'ca',
      'Magnésio': 'mg', 'mg': 'mg',
      'Manganês': 'mn', 'mn': 'mn',
      'Fósforo': 'p', 'p': 'p',
      'Ferro': 'fe', 'fe': 'fe',
      'Sódio': 'na', 'na': 'na',
      'Potássio': 'k', 'k': 'k',
      'Cobre': 'cu', 'cu': 'cu',
      'Zinco': 'zn', 'zn': 'zn',
      // Vitaminas
      'Retinol': 'vit_a', 'RE': 'vit_a', 'Vit A (RAE)': 'vit_a', 'vit_a': 'vit_a',
      'Vit B1': 'b1', 'b1': 'b1',
      'Vit B2': 'b2', 'b2': 'b2',
      'Vit B6': 'b6', 'b6': 'b6',
      'Vit B3': 'b3', 'b3': 'b3',
      'Vit C': 'vit_c', 'vit_c': 'vit_c',
      'Selênio': 'se', 'se': 'se',
      'Vit D': 'vit_d', 'vit_d': 'vit_d',
      'Vit E': 'vit_e', 'vit_e': 'vit_e',
      'Folato (B9)': 'b9', 'b9': 'b9',
      'Vitamina B12': 'b12', 'b12': 'b12',
    };

    const normalized = {...EMPTY_FOOD()};

    Object.entries(f).forEach(([key, val]) => {
      const internalKey = keyMap[key] || key; // usa chave original se não mapeada
      if (internalKey in normalized || internalKey === 'unidade') {
        // Converte strings numéricas com vírgula decimal (ex: "0,84" → 0.84)
        if (typeof val === 'string') {
          const cleaned = val.trim().replace(',', '.');
          const num = parseFloat(cleaned);
          normalized[internalKey] = isNaN(num) ? val : num;
        } else {
          normalized[internalKey] = val;
        }
      }
    });

    return normalized;
  };

  const importJson = () => {
    setJsonError(''); setJsonSuccess('');
    try {
      let parsed = JSON.parse(jsonText);
      if (!Array.isArray(parsed)) parsed = [parsed];

      // Normaliza chaves — aceita qualquer formato
      const normalized = parsed.map(normalizeFood);

      // Valida: deve ter "nome" após normalização
      const invalid = normalized.filter(f => !f.nome || !String(f.nome).trim());
      if (invalid.length > 0) {
        setJsonError(`${invalid.length} item(s) sem campo "nome" (ou "Nome"). Corrija antes de importar.`);
        return;
      }

      // Separa duplicatas de novos
      const toAdd = [];
      const skipped = [];
      normalized.forEach(f => {
        const norm = normName(f.nome);
        const alreadyInCustom = customFoods.some(c => normName(c.nome) === norm);
        const alreadyInBase   = FOODS_RAW.some(b => normName(b.nome) === norm);
        if (alreadyInCustom || alreadyInBase) {
          skipped.push(f.nome);
        } else {
          toAdd.push(f);
        }
      });

      if (toAdd.length > 0) {
        onCustomFoodsChange([...customFoods, ...toAdd], { batchAdd: toAdd });
      }

      // Monta mensagem de resultado
      let msg = '';
      if (toAdd.length > 0)   msg += `✅ ${toAdd.length} alimento(s) importado(s). `;
      if (skipped.length > 0) msg += `⚠️ ${skipped.length} ignorado(s) por duplicata: ${skipped.slice(0,5).join(', ')}${skipped.length>5?` e mais ${skipped.length-5}...`:'.'} `;
      if (toAdd.length === 0 && skipped.length > 0) {
        setJsonError(`Todos os ${skipped.length} alimento(s) já existem no banco. Nenhum foi importado.`);
        return;
      }

      setJsonSuccess(msg);
      setJsonText('');
    } catch(e) {
      setJsonError('JSON inválido. Verifique a formatação e tente novamente.');
    }
  };

  const [confirmClear, setConfirmClear] = useState(false);

  const clearAll = async () => {
    // Exclui cada documento individualmente no alimentos_db
    for (const f of customFoods) {
      await FB.excluirAlimento(f.nome).catch(()=>{});
    }
    onCustomFoodsChange([], {});
    setConfirmClear(false);
    setMode('list');
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(customFoods, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='meus_alimentos.json'; a.click();
    URL.revokeObjectURL(url);
  };

  const inpF = (field) => {
    const f = allFields.find(x => x.k===field);
    return (
      <div style={{display:'flex',flexDirection:'column',gap:3,flex:'1 1 150px'}}>
        <label style={{fontSize:11,color:G.muted}}>{f.l}{f.required&&<span style={{color:G.danger}}> *</span>}</label>
        <input
          type={f.type} step={f.type==='number'?'0.001':undefined}
          value={form[field]}
          onChange={e => { setForm(prev => ({...prev, [field]: f.type==='number' ? e.target.value : e.target.value})); if(field==='nome') setDupWarning(''); }}
          style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none'}}
        />
      </div>
    );
  };

  const JSON_EXAMPLE = JSON.stringify([{
    nome:"Exemplo Alimento", medida:"g",
    ptn_a:0, ptn_v:5, carb:20, sat:1, poli:0.5, mono:0.5,
    fibra:2, ca:10, mg:5, fe:0.5, na:50, k:100,
    vit_c:5, b1:0.1
  }], null, 2);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>

      {/* Cabeçalho da aba */}
      <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14,color:G.text}}>🥦 Banco de Alimentos Personalizado</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button onClick={()=>{setMode('manual');setForm(EMPTY_FOOD());setEditIdx(null);}}
              style={{padding:'6px 14px',background:mode==='manual'?G.accent:G.panel,color:mode==='manual'?'#0f1117':G.text,
                border:`1px solid ${mode==='manual'?G.accent:G.border}`,borderRadius:8,fontSize:12,cursor:'pointer',fontWeight:600}}>
              ✏️ Cadastro manual
            </button>
            <button onClick={()=>{setMode('json');setJsonError('');setJsonSuccess('');}}
              style={{padding:'6px 14px',background:mode==='json'?G.accent:G.panel,color:mode==='json'?'#0f1117':G.text,
                border:`1px solid ${mode==='json'?G.accent:G.border}`,borderRadius:8,fontSize:12,cursor:'pointer',fontWeight:600}}>
              📥 Importar JSON
            </button>
            {customFoods.length > 0 && (
              <>
                <button onClick={exportJson}
                  style={{padding:'6px 14px',background:G.panel,color:G.muted,
                    border:`1px solid ${G.border}`,borderRadius:8,fontSize:12,cursor:'pointer'}}>
                  📤 Exportar JSON
                </button>
                {confirmClear ? (
                  <>
                    <span style={{fontSize:12,color:G.danger}}>Apagar todos os {customFoods.length} alimentos?</span>
                    <button onClick={clearAll}
                      style={{padding:'6px 12px',background:G.danger,border:'none',borderRadius:8,
                        color:'#fff',fontSize:12,cursor:'pointer',fontWeight:700}}>
                      Confirmar
                    </button>
                    <button onClick={()=>setConfirmClear(false)}
                      style={{padding:'6px 10px',background:G.panel,border:`1px solid ${G.border}`,
                        borderRadius:8,color:G.muted,fontSize:12,cursor:'pointer'}}>
                      Cancelar
                    </button>
                  </>
                ) : (
                  <button onClick={()=>setConfirmClear(true)}
                    style={{padding:'6px 14px',background:'none',border:`1px solid ${G.danger}`,
                      borderRadius:8,color:G.danger,fontSize:12,cursor:'pointer'}}>
                    🗑 Limpar tudo
                  </button>
                )}
              </>
            )}
            {mode!=='list' && (
              <button onClick={()=>setMode('list')}
                style={{padding:'6px 14px',background:'none',color:G.muted,border:`1px solid ${G.border}`,borderRadius:8,fontSize:12,cursor:'pointer'}}>
                ← Voltar à lista
              </button>
            )}
          </div>
        </div>

        {/* ── MODO: CADASTRO MANUAL ── */}
        {mode==='manual' && (
          <div>
            <div style={{fontWeight:600,color:G.accent,marginBottom:12,fontSize:13}}>
              {editIdx!==null ? '✏️ Editando alimento' : '➕ Novo alimento'}
            </div>
            {/* Campos principais */}
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inpF('nome')}
              <div style={{display:'flex',flexDirection:'column',gap:3,flex:'1 1 140px'}}>
                <label style={{fontSize:11,color:G.muted}}>Unidade base <span style={{color:G.danger}}>*</span></label>
                <select value={form.unidade_base||'g'}
                  onChange={e=>setForm(prev=>({...prev,unidade_base:e.target.value}))}
                  style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none'}}>
                  <option value="g">g — Gramas</option>
                  <option value="un">un — Unidade</option>
                  <option value="ml">ml — Mililitros</option>
                </select>
              </div>
              {form.unidade_base==='un' && (
                <div style={{display:'flex',flexDirection:'column',gap:3,flex:'1 1 140px'}}>
                  <label style={{fontSize:11,color:G.muted}}>Peso por unidade (g)</label>
                  <input type="number" step="0.1" value={form.peso_por_unidade||100}
                    onChange={e=>setForm(prev=>({...prev,peso_por_unidade:parseFloat(e.target.value)||100}))}
                    style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none'}}/>
                  <span style={{fontSize:10,color:G.muted}}>Ex: ovo ≈ 50g por unidade</span>
                </div>
              )}
            </div>
            <div style={{fontWeight:600,fontSize:11,color:G.muted,marginBottom:8,marginTop:4}}>
              MACRONUTRIENTES — valores sempre por 100g
              {form.unidade_base==='un' && <span style={{color:G.warn,marginLeft:6}}>⚠ informe por 100g, não por unidade</span>}
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inpF('ptn_a')}{inpF('ptn_v')}{inpF('carb')}
              {inpF('sat')}{inpF('poli')}{inpF('mono')}{inpF('fibra')}
            </div>
            <div style={{fontWeight:600,fontSize:11,color:G.muted,marginBottom:8}}>MINERAIS</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inpF('ca')}{inpF('mg')}{inpF('p')}{inpF('fe')}{inpF('na')}{inpF('k')}{inpF('zn')}
            </div>
            <div style={{fontWeight:600,fontSize:11,color:G.muted,marginBottom:8}}>VITAMINAS</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
              {inpF('vit_a')}{inpF('b1')}{inpF('b2')}{inpF('b6')}{inpF('b3')}{inpF('vit_c')}{inpF('se')}{inpF('vit_d')}{inpF('vit_e')}{inpF('b9')}
            </div>
            {dupWarning && (
              <div style={{padding:'8px 12px',background:'#f871711a',border:`1px solid ${G.danger}`,borderRadius:8,
                color:G.danger,fontSize:12,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                ⚠️ {dupWarning}
              </div>
            )}
            <div style={{display:'flex',gap:10}}>
              <button onClick={saveForm} disabled={!form.nome.trim()}
                style={{padding:'9px 24px',background:G.accent,border:'none',borderRadius:8,
                  color:'#0f1117',fontWeight:700,fontSize:13,cursor:form.nome.trim()?'pointer':'not-allowed',
                  opacity:form.nome.trim()?1:0.5}}>
                {editIdx!==null ? '💾 Salvar alterações' : '✅ Adicionar alimento'}
              </button>
              <button onClick={()=>{setMode('list');setForm(EMPTY_FOOD());setEditIdx(null);}}
                style={{padding:'9px 18px',background:'none',border:`1px solid ${G.border}`,borderRadius:8,color:G.muted,fontSize:13,cursor:'pointer'}}>
                Cancelar
              </button>
            </div>
          </div>
        )}

        {/* ── MODO: IMPORTAR JSON ── */}
        {mode==='json' && (
          <div>
            <div style={{fontWeight:600,color:G.accent,marginBottom:8,fontSize:13}}>📥 Importação em massa via JSON</div>
            <div style={{fontSize:12,color:G.muted,marginBottom:12,lineHeight:1.6}}>
              Cole um array JSON com os alimentos. Aceita tanto o formato interno do sistema quanto o formato exportado direto da planilha
              (chaves como <code style={{background:G.panel,padding:'1px 5px',borderRadius:4,color:G.accent}}>Nome</code>, <code style={{background:G.panel,padding:'1px 5px',borderRadius:4,color:G.accent}}>Carbs</code>, <code style={{background:G.panel,padding:'1px 5px',borderRadius:4,color:G.accent}}>Fat</code>, <code style={{background:G.panel,padding:'1px 5px',borderRadius:4,color:G.accent}}>Ptn (A)</code> etc. são reconhecidas automaticamente).
              Apenas o campo nome é obrigatório. Campos omitidos são preenchidos com zero.
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:G.muted,marginBottom:4}}>Exemplo de formato:</div>
              <pre style={{background:G.panel,padding:12,borderRadius:8,fontSize:11,color:G.muted,overflowX:'auto',border:`1px solid ${G.border}`}}>
                {JSON_EXAMPLE}
              </pre>
            </div>
            <textarea
              value={jsonText}
              onChange={e => { setJsonText(e.target.value); setJsonError(''); setJsonSuccess(''); }}
              rows={8}
              placeholder={'Cole o JSON aqui...'}
              style={{width:'100%',padding:'10px 12px',background:G.panel,border:`1px solid ${jsonError?G.danger:G.border}`,
                borderRadius:8,color:G.text,fontSize:12,outline:'none',resize:'vertical',
                boxSizing:'border-box',fontFamily:'monospace'}}
            />
            {jsonError && <div style={{color:G.danger,fontSize:12,marginTop:4}}>❌ {jsonError}</div>}
            {jsonSuccess && <div style={{color:G.accent,fontSize:12,marginTop:4}}>✅ {jsonSuccess}</div>}
            <div style={{display:'flex',gap:10,marginTop:10}}>
              <button onClick={importJson} disabled={!jsonText.trim()}
                style={{padding:'9px 24px',background:G.accent,border:'none',borderRadius:8,
                  color:'#0f1117',fontWeight:700,fontSize:13,cursor:jsonText.trim()?'pointer':'not-allowed',
                  opacity:jsonText.trim()?1:0.5}}>
                📥 Importar
              </button>
              <button onClick={()=>setJsonText(JSON_EXAMPLE)}
                style={{padding:'9px 14px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.muted,fontSize:12,cursor:'pointer'}}>
                Carregar exemplo
              </button>
            </div>
          </div>
        )}

        {/* ── MODO: LISTA ── */}
        {mode==='list' && (
          <div>
            {customFoods.length === 0 ? (
              <div style={{textAlign:'center',padding:'32px 0',color:G.muted,fontSize:13}}>
                <div style={{fontSize:32,marginBottom:8}}>🥗</div>
                Nenhum alimento cadastrado ainda.<br/>
                <span style={{fontSize:12}}>Use "Cadastro manual" ou "Importar JSON" para adicionar.</span>
              </div>
            ) : (
              <>
                <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center'}}>
                  <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="Filtrar alimentos…"
                    style={{flex:1,padding:'7px 12px',background:G.panel,border:`1px solid ${G.border}`,
                      borderRadius:8,color:G.text,fontSize:13,outline:'none'}}/>
                  <span style={{fontSize:12,color:G.muted,whiteSpace:'nowrap'}}>{filtered.length} de {customFoods.length}</span>
                </div>
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead>
                      <tr style={{color:G.muted,borderBottom:`1px solid ${G.border}`}}>
                        <th style={{textAlign:'left',padding:'6px 8px',fontWeight:500}}>Alimento</th>
                        <th style={{textAlign:'left',padding:'6px 8px',fontWeight:500}}>Medida</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Ptn (g)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Carb (g)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Gord (g)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Fibra (g)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Kcal*</th>
                        <th style={{padding:'6px 8px'}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((food, idx) => {
                        const realIdx = customFoods.indexOf(food);
                        const ptn = (food.ptn_a||0)+(food.ptn_v||0);
                        const gord = (food.sat||0)+(food.poli||0)+(food.mono||0);
                        const kcalPer = (ptn+food.carb)*4 + gord*9;
                        return (
                          <tr key={idx} style={{borderBottom:`1px solid ${G.border}20`,color:G.text}}>
                            <td style={{padding:'7px 8px',fontWeight:500}}>{food.nome}</td>
                            <td style={{padding:'7px 8px',color:G.muted}}>{food.medida}</td>
                            <td style={{textAlign:'right',padding:'7px 8px'}}>{ptn.toFixed(1)}</td>
                            <td style={{textAlign:'right',padding:'7px 8px'}}>{(food.carb||0).toFixed(1)}</td>
                            <td style={{textAlign:'right',padding:'7px 8px'}}>{gord.toFixed(1)}</td>
                            <td style={{textAlign:'right',padding:'7px 8px'}}>{(food.fibra||0).toFixed(1)}</td>
                            <td style={{textAlign:'right',padding:'7px 8px',color:G.accent}}>{kcalPer.toFixed(0)}</td>
                            <td style={{padding:'7px 8px'}}>
                              <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                                <button onClick={()=>startEdit(food,realIdx)}
                                  style={{padding:'3px 8px',background:G.panel,border:`1px solid ${G.border}`,
                                    borderRadius:5,color:G.muted,fontSize:11,cursor:'pointer'}}>✏️</button>
                                {deleteConfirm===realIdx ? (
                                  <>
                                    <button onClick={()=>deleteFood(realIdx)}
                                      style={{padding:'3px 8px',background:G.danger,border:'none',
                                        borderRadius:5,color:'#fff',fontSize:11,cursor:'pointer',fontWeight:700}}>Confirmar</button>
                                    <button onClick={()=>setDeleteConfirm(null)}
                                      style={{padding:'3px 8px',background:G.panel,border:`1px solid ${G.border}`,
                                        borderRadius:5,color:G.muted,fontSize:11,cursor:'pointer'}}>Cancelar</button>
                                  </>
                                ) : (
                                  <button onClick={()=>setDeleteConfirm(realIdx)}
                                    style={{padding:'3px 8px',background:'none',border:`1px solid ${G.danger}`,
                                      borderRadius:5,color:G.danger,fontSize:11,cursor:'pointer'}}>🗑</button>
                                )}
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <div style={{fontSize:10,color:G.muted,marginTop:6}}>* Kcal calculado por 100g/unidade</div>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ─── COMPONENTE: BARRA DE TEMPLATES FAVORITOS ───────────────────────────────
const TemplatesBar = ({ templates, hasMeals, onSave, onLoad, onDelete }) => {
  const [saving, setSaving] = useState(false);
  const [newName, setNewName] = useState('');
  const [confirmLoad, setConfirmLoad] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);

  const handleSave = () => {
    if (!newName.trim()) return;
    onSave(newName);
    setNewName('');
    setSaving(false);
  };

  return (
    <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,fontWeight:700,color:G.text}}>⭐ Cardápios Favoritos</span>
          <span style={{fontSize:11,color:G.muted}}>{templates.length} salvo(s)</span>
        </div>
        {/* Botão salvar favorito */}
        {hasMeals && !saving && (
          <button onClick={()=>setSaving(true)}
            style={{padding:'6px 14px',background:`${G.accent}22`,border:`1px solid ${G.accent}`,
              borderRadius:8,color:G.accent,fontSize:12,cursor:'pointer',fontWeight:700}}>
            ⭐ Salvar como favorito
          </button>
        )}
        {saving && (
          <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            <input
              autoFocus
              value={newName}
              onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')handleSave();if(e.key==='Escape')setSaving(false);}}
              placeholder="Nome do template (ex: Base Emagrecimento)"
              style={{padding:'6px 10px',background:G.panel,border:`1px solid ${G.accent}`,
                borderRadius:8,color:G.text,fontSize:13,outline:'none',minWidth:220}}
            />
            <button onClick={handleSave} disabled={!newName.trim()}

// ─── COMPONENTE: DASHBOARD ───────────────────────────────────────────────────
const Dashboard = ({ patients, onSelectPatient, onAddPatient }) => {
  const [search, setSearch] = useState('');

  // ── Estatísticas ──────────────────────────────────────────────────────────
  const stats = useMemo(() => {
    const total = patients.length;
    const comIdade = patients.filter(p => p.dataNasc && calcIdade(p.dataNasc) > 0);
    const mediaIdade = comIdade.length
      ? Math.round(comIdade.reduce((s,p) => s + calcIdade(p.dataNasc), 0) / comIdade.length)
      : null;

    const hoje = new Date();
    const diaHoje = hoje.getDate();
    const mesHoje = hoje.getMonth() + 1;
    const aniversariantes = patients.filter(p => {
      if (!p.dataNasc) return false;
      const partes = p.dataNasc.split('-');
      if (partes.length < 3) return false;
      return parseInt(partes[2],10) === diaHoje && parseInt(partes[1],10) === mesHoje;
    });

    const classify = (obj='') => {
      const o = obj.toLowerCase();
      if (/emagrec|perda|peso|deficit|cut/.test(o)) return 'emagrecimento';
      if (/hipertrofia|musculo|massa|ganho|bulk|perform|atleta/.test(o)) return 'hipertrofia';
      return 'outro';
    };
    const grupos = {emagrecimento:0, hipertrofia:0, outro:0};
    patients.forEach(p => { grupos[classify(p.objetivo)]++; });

    return { total, mediaIdade, aniversariantes, grupos };
  }, [patients]);

  const filtered = useMemo(() => {
    if (!search.trim()) return patients;
    const q = search.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    return patients.filter(p => {
      const n = ((p.nome||'')+(p.objetivo||'')+(p.telefone||'')+(p.instagram||''))
        .toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
      return n.includes(q);
    });
  }, [patients, search]);

  const formatWA = (tel='') => {
    const digits = (tel||'').replace(/\D/g,'');
    if (!digits) return null;
    return digits.startsWith('55') ? digits : '55' + digits;
  };

  const objetivoColor = (obj='') => {
    if (/emagrec|perda|peso|cut/i.test(obj)) return {bg:'#f8717122',fg:'#f87171'};
    if (/hipertrofia|musculo|massa|bulk|perform/i.test(obj)) return {bg:'#60a5fa22',fg:'#60a5fa'};
    return {bg:`${G.border}44`,fg:G.muted};
  };

  const objetivoLabels = {
    emagrecimento: {l:'Emagrecimento', color:'#f87171'},
    hipertrofia:   {l:'Hipertrofia / Performance', color:'#60a5fa'},
    outro:         {l:'Outros', color:'#7c85a2'},
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>

      {/* ── Botão adicionar paciente ── */}
      <button onClick={onAddPatient} style={{
        width:'100%', padding:'14px', borderRadius:12,
        background:G.grad, border:'none', color:'#0f1117',
        fontWeight:800, fontSize:15, cursor:'pointer',
        letterSpacing:'-0.3px', boxShadow:'0 4px 20px #4ade8033',
        transition:'opacity .15s',
      }}
        onMouseEnter={e=>e.currentTarget.style.opacity='0.9'}
        onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
        + Adicionar Paciente
      </button>

      {/* ── Cards de resumo ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
        {[
          {icon:'👥', label:'Total', value: stats.total, color: G.accent},
          {icon:'🎂', label:'Média de Idade', value: stats.mediaIdade ? stats.mediaIdade+' anos' : '—', color: G.info},
          {icon:'🎉', label:'Aniversariantes', value: stats.aniversariantes.length, color: G.warn, aniversariantes: stats.aniversariantes},
          {icon:'🍽', label:'Com plano', value: patients.filter(p=>p.meals?.length>0).length, color:'#a78bfa'},
        ].map((c,i) => (
          <AniversariantesCard key={i} card={c} onSelectPatient={onSelectPatient}/>
        ))}
      </div>

      {/* ── Distribuição de objetivos (compacto) ── */}
      <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:14}}>
        <div style={{fontWeight:700,fontSize:12,color:G.muted,marginBottom:10,textTransform:'uppercase',letterSpacing:'0.5px'}}>Distribuição de objetivos</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {Object.entries(stats.grupos).map(([key, count]) => {
            const meta = objetivoLabels[key];
            const pct = stats.total > 0 ? Math.round(count/stats.total*100) : 0;
            return (
              <div key={key} style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:110,fontSize:12,color:G.muted,flexShrink:0}}>{meta.l}</div>
                <div style={{flex:1,height:8,background:G.panel,borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${pct}%`,background:meta.color,borderRadius:4,transition:'width .5s',minWidth:count>0?4:0}}/>
                </div>
                <div style={{fontSize:12,color:meta.color,fontWeight:600,minWidth:32,textAlign:'right'}}>{count}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Lista de pacientes (cards) ── */}
      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,gap:10}}>
          <div style={{fontWeight:700,fontSize:13,color:G.text}}>Seus pacientes <span style={{color:G.muted,fontWeight:400,fontSize:12}}>({filtered.length})</span></div>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Buscar por nome, objetivo…"
            style={{padding:'7px 12px',background:G.card,border:`1px solid ${G.border}`,
              borderRadius:8,color:G.text,fontSize:12,outline:'none',width:210}}/>
        </div>

        {filtered.length === 0 && (
          <div style={{padding:'32px',textAlign:'center',color:G.muted,background:G.card,borderRadius:12,border:`1px solid ${G.border}`}}>
            {search ? 'Nenhum paciente encontrado para essa busca.' : 'Nenhum paciente cadastrado ainda.'}
          </div>
        )}

        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(p => {
            const wa = formatWA(p.telefone);
            const temPlano = p.meals?.length > 0;
            const cor = objetivoColor(p.objetivo);
            const isAniv = stats.aniversariantes.some(a => a.id === p.id);
            return (
              <div key={p.id}
                onClick={()=>onSelectPatient(p.id)}
                style={{
                  display:'flex', alignItems:'center', gap:14,
                  background:G.card, borderRadius:12,
                  border:`1px solid ${G.border}`,
                  padding:'12px 16px', cursor:'pointer',
                  transition:'border-color .15s, background .15s',
                }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=G.accent;e.currentTarget.style.background=`${G.accent}08`;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=G.border;e.currentTarget.style.background=G.card;}}>

                {/* Avatar */}
                <div style={{
                  width:42, height:42, borderRadius:'50%', flexShrink:0,
                  background:`linear-gradient(135deg,${G.accent}40,${G.info}40)`,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:17, fontWeight:900, color:G.accent, position:'relative',
                }}>
                  {(p.nome||'?')[0].toUpperCase()}
                  {isAniv && (
                    <span style={{position:'absolute',top:-2,right:-2,fontSize:12}}>🎉</span>
                  )}
                </div>

                {/* Info principal */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:G.text,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                    {p.nome || <span style={{color:G.muted,fontStyle:'italic'}}>Sem nome</span>}
                    {isAniv && <span style={{fontSize:11,color:G.warn,marginLeft:6,fontWeight:400}}>🎂 aniversário hoje!</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginTop:3,flexWrap:'wrap'}}>
                    {p.objetivo && (
                      <span style={{fontSize:11,padding:'1px 7px',borderRadius:8,
                        background:cor.bg,color:cor.fg,fontWeight:500}}>
                        {p.objetivo}
                      </span>
                    )}
                    {p.dataNasc && (
                      <span style={{fontSize:11,color:G.muted}}>{calcIdade(p.dataNasc)} anos</span>
                    )}
                    <span style={{fontSize:11,color:temPlano?G.accent:G.muted}}>
                      {temPlano ? `${p.meals.length} refeições` : 'sem plano'}
                    </span>
                  </div>
                  {p.instagram && (
                    <div style={{fontSize:10,color:G.muted,marginTop:1}}>@{p.instagram.replace('@','')}</div>
                  )}
