// ─── CÁLCULOS ────────────────────────────────────────────────────────────────
const calcKcal = (f, g) => {
  if (f.unidade) {
    return (f.ptn_a + f.ptn_v + f.carb) * 4 + (f.sat + f.poli + f.mono) * 9;
  }
  const fator = g / 100;
  return ((f.ptn_a + f.ptn_v + f.carb) * 4 + (f.sat + f.poli + f.mono) * 9) * fator;
};

const calcNutriente = (f, g, key) => {
  if (f.unidade) return (f[key] || 0);
  return (f[key] || 0) * (g / 100);
};

const calcTMB = (p) => {
  const { peso, altura, idade, sexo, gordura, fa } = p;
  const mlg = peso * (1 - gordura / 100);
  let harris, mifflin, tinsley_p, tinsley_mlg, cunningham;
  if (sexo === 'M') {
    harris = 88.362 + 13.397 * peso + 4.799 * altura - 5.677 * idade;
    mifflin = 10 * peso + 6.25 * altura - 5 * idade + 5;
  } else {
    harris = 447.593 + 9.247 * peso + 3.098 * altura - 4.330 * idade;
    mifflin = 10 * peso + 6.25 * altura - 5 * idade - 161;
  }
  tinsley_p = 7.7 * peso + 1729;
  tinsley_mlg = 14.4 * mlg + 113 * (altura / 100) + 113;
  cunningham = 500 + 22 * mlg;
  return {
    harris: Math.round(harris * fa),
    mifflin: Math.round(mifflin * fa),
    tinsley_p: Math.round(tinsley_p * fa),
    tinsley_mlg: Math.round(tinsley_mlg * fa),
    cunningham: Math.round(cunningham * fa),
    mlg: Math.round(mlg * 10) / 10,
    mgorda: Math.round((peso - mlg) * 10) / 10,
  };
};

const Badge = ({ v, max, label, unit }) => {
  const pct = Math.min((v / max) * 100, 100);
  const ok = pct >= 80;
  const warn = pct >= 50 && pct < 80;
  const color = ok ? G.accent : warn ? G.warn : G.danger;
  return (
    <div style={{marginBottom:6}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:G.muted,marginBottom:2}}>
        <span>{label}</span>
        <span style={{color:ok?G.accent:warn?G.warn:G.danger}}>{v.toFixed(1)}{unit} <span style={{color:G.muted}}>/ {max}{unit}</span></span>
      </div>
      <div style={{height:4,borderRadius:4,background:'#2a3050',overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:4,transition:'width .4s'}}/>
      </div>
    </div>
  );
};

// Autocomplete de alimentos
const FoodSearch = ({ onAdd, allFoods }) => {
  const foodList = allFoods || FOODS_RAW;
  const [query, setQuery]       = useState('');
  const [open, setOpen]         = useState(false);
  const [highlighted, setHigh]  = useState(-1);   // índice destacado no dropdown
  const [qtd, setQtd]           = useState('');
  const [sel, setSel]           = useState(null);
  const wrapRef   = useRef();   // div externa (fecha ao clicar fora)
  const inputRef  = useRef();   // input de busca
  const qtdRef    = useRef();   // input de quantidade
  const listRef   = useRef();   // div da lista (para scroll automático)

  const results = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return foodList.filter(f => {
      const n = f.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      return n.includes(q);
    }).slice(0, 10);
  }, [query, foodList]);

  // Fecha dropdown ao clicar fora do componente inteiro
  useEffect(() => {
    const h = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  // Scroll automático para item destacado
  useEffect(() => {
    if (highlighted >= 0 && listRef.current) {
      const el = listRef.current.children[highlighted];
      if (el) el.scrollIntoView({ block: 'nearest' });
    }
  }, [highlighted]);

  const choose = (f) => {
    setSel(f);
    setQuery(f.nome);
    setOpen(false);
    setHigh(-1);
    const defaultQtd = f.unidade ? '1' : '100';
    setQtd(defaultQtd);
    // Foca e seleciona tudo no campo de quantidade
    setTimeout(() => {
      if (qtdRef.current) { qtdRef.current.focus(); qtdRef.current.select(); }
    }, 30);
  };

  const add = () => {
    if (!sel || !qtd) return;
    onAdd({ food: sel, qtd: parseFloat(qtd) });
    setQuery(''); setSel(null); setQtd(''); setOpen(false); setHigh(-1);
    // Devolve foco para o campo de busca
    setTimeout(() => inputRef.current?.focus(), 30);
  };

  // Navegação por teclado no input de busca
  const handleSearchKey = (e) => {
    if (!open || results.length === 0) {
      if (e.key === 'ArrowDown') { setOpen(true); setHigh(0); e.preventDefault(); }
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setHigh(h => Math.min(h + 1, results.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setHigh(h => Math.max(h - 1, 0));
    } else if (e.key === 'Enter' || e.key === 'Tab') {
      if (highlighted >= 0 && results[highlighted]) {
        e.preventDefault();
        choose(results[highlighted]);
      } else if (results.length > 0) {
        // Nenhum destacado → pega o primeiro
        e.preventDefault();
        choose(results[0]);
      }
    } else if (e.key === 'Escape') {
      setOpen(false); setHigh(-1);
    }
  };

  // Enter/Tab no campo de quantidade → adiciona o alimento
  const handleQtdKey = (e) => {
    if (e.key === 'Enter' || e.key === 'Tab') {
      if (sel && qtd) {
        e.preventDefault();
        add();
      }
    }
  };

  return (
    <div ref={wrapRef} style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>

      {/* ── Campo de busca com dropdown ── */}
      <div style={{position:'relative',flex:'1 1 200px',minWidth:180}}>
        <input
          ref={inputRef}
          value={query}
          onChange={e => { setQuery(e.target.value); setOpen(true); setSel(null); setHigh(-1); }}
          onFocus={() => { if (query.trim()) setOpen(true); }}
          onKeyDown={handleSearchKey}
          placeholder="Buscar alimento… (↑↓ navegar, Enter selecionar)"
          autoComplete="off"
          style={{width:'100%',padding:'8px 12px',background:G.card,
            border:`1px solid ${open && results.length ? G.accent : G.border}`,
            borderRadius:8,color:G.text,fontSize:13,outline:'none',
            boxSizing:'border-box',transition:'border-color .15s'}}
        />

        {/* Dropdown */}
        {open && results.length > 0 && (
          <div ref={listRef} style={{
            position:'absolute',top:'calc(100% + 4px)',left:0,right:0,
            background:G.panel,border:`1px solid ${G.accent}55`,
            borderRadius:8,zIndex:9999,maxHeight:240,overflowY:'auto',
            boxShadow:'0 12px 40px #00000088',
          }}>
            {results.map((f, i) => (
              <div
                key={i}
                onMouseDown={e => { e.preventDefault(); choose(f); }} // preventDefault evita blur no input
                onMouseEnter={() => setHigh(i)}
                style={{
                  padding:'8px 12px',cursor:'pointer',fontSize:13,
                  color: i === highlighted ? '#0f1117' : G.text,
                  background: i === highlighted ? G.accent : 'transparent',
                  borderBottom:`1px solid ${G.border}30`,
                  display:'flex',justifyContent:'space-between',alignItems:'center',
                  transition:'background .1s',
                }}
              >
                <span style={{fontWeight: i === highlighted ? 700 : 400}}>{f.nome}</span>
                <span style={{
                  fontSize:11,
                  color: i === highlighted ? '#0f1117aa' : G.muted,
                  marginLeft:8,
                }}>{f.medida}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── Quantidade ── */}
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <input
          ref={qtdRef}
          value={qtd}
          onChange={e => setQtd(e.target.value)}
          onKeyDown={handleQtdKey}
          type="number"
          min="0"
          placeholder={sel?.unidade ? 'Un.' : 'g'}
          style={{width:72,padding:'8px 10px',background:G.card,
            border:`1px solid ${G.border}`,borderRadius:8,
            color:G.text,fontSize:13,outline:'none'}}
        />
        <span style={{color:G.muted,fontSize:12,minWidth:16}}>{sel?.unidade ? 'un.' : 'g'}</span>
      </div>

      {/* ── Botão adicionar ── */}
      <button
        onClick={add}
        disabled={!sel || !qtd}
        style={{padding:'8px 18px',background:G.accent,color:'#0f1117',borderRadius:8,
          border:'none',fontWeight:700,fontSize:13,
          cursor: sel && qtd ? 'pointer' : 'not-allowed',
          opacity: sel && qtd ? 1 : 0.4,
          transition:'opacity .15s'}}
      >
        + Adicionar
      </button>
    </div>
  );
};

                            if (isNaN(val) || val < 0) return;
                            const items = meal.items.map((it,idx) => idx===i ? {...it, qtd: val} : it);
                            onChange({...meal, items});
                          }}
                          style={{width:54,padding:'3px 6px',background:G.panel,
                            border:`1px solid ${G.border}`,borderRadius:6,
                            color:G.text,fontSize:12,outline:'none',textAlign:'right'}}
                        />
                        <span style={{color:G.muted,fontSize:11}}>{item.food.unidade?'un.':'g'}</span>
                      </div>
                    </td>
                    <td style={{textAlign:'right',padding:'5px 6px',color:G.accent,verticalAlign:'top'}}>{k.toFixed(0)}</td>
                    <td style={{textAlign:'right',padding:'5px 6px',verticalAlign:'top'}}>{ptn.toFixed(1)}g</td>
                    <td style={{textAlign:'right',padding:'5px 6px',verticalAlign:'top'}}>{carb.toFixed(1)}g</td>
                    <td style={{textAlign:'right',padding:'5px 6px',verticalAlign:'top'}}>{gord.toFixed(1)}g</td>
                    <td style={{padding:'5px 6px',verticalAlign:'top'}}>
                      <button onClick={()=>removeItem(i)} style={{background:'none',border:'none',color:G.danger,cursor:'pointer',fontSize:14}}>×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{borderTop:`1px solid ${G.border}`,color:G.accent,fontWeight:700}}>
                <td style={{padding:'6px 6px'}}>Total</td>
                <td></td>
                <td style={{textAlign:'right',padding:'6px 6px'}}>{totals.kcal.toFixed(0)}</td>
                <td style={{textAlign:'right',padding:'6px 6px'}}>{(totals.ptn_a+totals.ptn_v).toFixed(1)}g</td>
                <td style={{textAlign:'right',padding:'6px 6px'}}>{totals.carb.toFixed(1)}g</td>
                <td style={{textAlign:'right',padding:'6px 6px'}}>{(totals.sat+totals.poli+totals.mono).toFixed(1)}g</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        )}
      </div>
    </div>
  );
};

      localStorage.setItem('nutriplan_logo', dataUrl);

      FB.set('nutriplan', 'settings', { logo: dataUrl, logoPos });

    reader.readAsDataURL(file);

                    <td style={{textAlign:'center',padding:'3px 6px',background:COR_TABELA,borderBottom:'1px solid #eee',color:r.noKcal?'#888':'inherit',fontStyle:r.noKcal?'italic':'inherit'}}>{r.noKcal ? '**' : r.kcalV.toFixed(0)}</td>
                    <td style={{textAlign:'center',padding:'3px 6px',background:COR_TABELA,borderBottom:'1px solid #eee',color:r.noKcal?'#888':'inherit',fontStyle:r.noKcal?'italic':'inherit'}}>{r.noKcal ? '**' : (r.g/peso).toFixed(1)}</td>
                  </tr>
                ))}
                <tr style={{fontWeight:'bold',borderTop:'2px solid #aaa',background:'#f5f5f5'}}>
                  <td style={{padding:'4px 6px'}}></td>
                  <td style={{textAlign:'center',padding:'4px 6px'}} colSpan={2}>Total</td>
                  <td style={{textAlign:'center',padding:'4px 6px',background:COR_TABELA}}>{totals.kcal.toFixed(0)}</td>
                  <td style={{textAlign:'center',padding:'4px 6px',color:'#555',fontSize:'9pt'}}>kcals</td>
                </tr>
                <tr style={{background:'#fafafa'}}>

                  <td style={{textAlign:'center',padding:'4px 6px',background:COR_TABELA}}>{(totals.kcal/peso).toFixed(1)}</td>
                  <td style={{textAlign:'center',padding:'4px 6px',color:'#555',fontSize:'9pt'}}>kcal/kg</td>
                </tr>
              </tbody>
            </table>

        </div>{/* fim padding wrapper */}

        {/* ══ RODAPÉ ══ */}
        <div style={{borderTop:'2px solid #e0e0e0', padding:'10px 24px',
          display:'flex', justifyContent:'space-between', alignItems:'center',

              <span style={{fontWeight:'bold'}}>Nutricionista {patient.profissional.nome}</span>

// db é preenchido pelo script Firebase que carrega antes do Babel
let db = window.__nutridb__ || null;
const setDb = (d) => { db = d; };

const FB = {
  async set(col, docId, data) {
    if (!db) return;
    const { doc, setDoc } = window.FirestoreSDK;
    await setDoc(doc(db, col, docId), data);
  },
  async get(col, docId) {
    if (!db) return null;
    const { doc, getDoc } = window.FirestoreSDK;
    const snap = await getDoc(doc(db, col, docId));
    return snap.exists() ? snap.data() : null;
  },
  onSnapshot(col, docId, cb) {
    if (!db) return () => {};
    const { doc, onSnapshot } = window.FirestoreSDK;
    return onSnapshot(doc(db, col, docId), snap => {
      if (snap.exists()) cb(snap.data());
    });
  },
};

// ─── COMPONENTE: GERENCIADOR DE ALIMENTOS ────────────────────────────────────
const EMPTY_FOOD = () => ({
  nome:'', medida:'g', ptn_a:0, ptn_v:0, carb:0, sat:0, poli:0, mono:0,
  fibra:0, ca:0, mg:0, mn:0, p:0, fe:0, na:0, k:0, cu:0, zn:0,
  vit_a:0, b1:0, b2:0, b6:0, b3:0, vit_c:0, se:0, vit_d:0, vit_e:0, b9:0,
});

const FoodManager = ({ customFoods, onCustomFoodsChange }) => {
  const [mode, setMode] = useState('list'); // 'list' | 'manual' | 'json'
  const [form, setForm] = useState(EMPTY_FOOD());
  const [editIdx, setEditIdx] = useState(null);
  const [jsonText, setJsonText] = useState('');
  const [jsonError, setJsonError] = useState('');
  const [jsonSuccess, setJsonSuccess] = useState('');
  const [search, setSearch] = useState('');
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  const allFields = [
    {k:'nome',       l:'Nome do alimento',    type:'text',   required:true},
    {k:'medida',     l:'Medida (g, un., etc)',type:'text',   required:true},
    {k:'ptn_a',      l:'Proteína Animal (g)',  type:'number'},
    {k:'ptn_v',      l:'Proteína Vegetal (g)', type:'number'},
    {k:'carb',       l:'Carboidratos (g)',      type:'number'},
    {k:'sat',        l:'Gordura Saturada (g)',  type:'number'},
    {k:'poli',       l:'Gordura Polins. (g)',   type:'number'},
    {k:'mono',       l:'Gordura Monins. (g)',   type:'number'},
    {k:'fibra',      l:'Fibra (g)',             type:'number'},
    {k:'ca',         l:'Cálcio (mg)',            type:'number'},
    {k:'mg',         l:'Magnésio (mg)',          type:'number'},
    {k:'p',          l:'Fósforo (mg)',           type:'number'},
    {k:'fe',         l:'Ferro (mg)',             type:'number'},
    {k:'na',         l:'Sódio (mg)',             type:'number'},
    {k:'k',          l:'Potássio (mg)',          type:'number'},
    {k:'zn',         l:'Zinco (mg)',             type:'number'},
    {k:'vit_a',      l:'Vitamina A (mcg)',       type:'number'},
    {k:'b1',         l:'Vitamina B1 (mg)',       type:'number'},
    {k:'b2',         l:'Vitamina B2 (mg)',       type:'number'},
    {k:'b6',         l:'Vitamina B6 (mg)',       type:'number'},
    {k:'b3',         l:'Vitamina B3 (mg)',       type:'number'},
    {k:'vit_c',      l:'Vitamina C (mg)',        type:'number'},
    {k:'se',         l:'Selênio (mcg)',          type:'number'},
    {k:'vit_d',      l:'Vitamina D (mcg)',       type:'number'},
    {k:'vit_e',      l:'Vitamina E (mg)',        type:'number'},
    {k:'b9',         l:'Folato B9 (mcg)',        type:'number'},
  ];

  const filtered = customFoods.filter(f =>
    f.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .includes(search.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''))
  );

  // Normaliza nome para comparação: sem acento, minúsculo, sem espaços duplos
  const normName = (n) => n.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');

  // Nomes já existentes: banco original + customFoods
  const existingNames = useMemo(() => {
    const allExisting = [...FOODS_RAW, ...customFoods];
    return new Set(allExisting.map(f => normName(f.nome)));
  }, [customFoods]);

  const [dupWarning, setDupWarning] = useState('');

  const saveForm = () => {
    if (!form.nome.trim()) return;
    const food = {...form};
    allFields.filter(f=>f.type==='number').forEach(f => { food[f.k] = parseFloat(food[f.k]) || 0; });

    // Verifica duplicata — ignora se estamos editando o mesmo item
    const norm = normName(food.nome);
    const isDup = customFoods.some((f, i) => i !== editIdx && normName(f.nome) === norm)
               || (editIdx === null && FOODS_RAW.some(f => normName(f.nome) === norm));

    if (isDup) {
      setDupWarning(`Já existe um alimento com o nome "${food.nome}" no banco de dados.`);
      return;
    }
    setDupWarning('');

    let updated;
    if (editIdx !== null) {
      updated = customFoods.map((f,i) => i===editIdx ? food : f);
    } else {
      updated = [...customFoods, food];
    }
    onCustomFoodsChange(updated);
    setForm(EMPTY_FOOD());
    setEditIdx(null);
    setMode('list');
  };

  const startEdit = (food, idx) => {
    setForm({...food});
    setEditIdx(idx);
    setMode('manual');
  };

  const deleteFood = (idx) => {
    onCustomFoodsChange(customFoods.filter((_,i) => i!==idx));
    setDeleteConfirm(null);
  };

  // Normaliza qualquer formato de JSON para as chaves internas do sistema.
  // Aceita tanto o formato do sistema (nome, carb, sat...) quanto o formato
  // do CSV exportado da planilha (Nome, Carbs, Fat, Ptn (A), etc.)
  const normalizeFood = (f) => {
    // Mapa de chaves alternativas → chave interna
    const keyMap = {
      // Nome
      'Nome': 'nome', 'NOME': 'nome',
      // Medida
      'Medida': 'medida', 'MEDIDA': 'medida',
      // Proteínas
      'Ptn (A)': 'ptn_a', 'ptn_a': 'ptn_a',
      'Ptn (V)': 'ptn_v', 'ptn_v': 'ptn_v',
      // Carboidratos
      'Carbs': 'carb', 'Carb': 'carb', 'carb': 'carb', 'Carboidrato': 'carb',
      // Gorduras
      'Fat': 'sat', 'Sat': 'sat', 'sat': 'sat', 'Gordura Saturada': 'sat',
      'Poli': 'poli', 'poli': 'poli',
      'Mono': 'mono', 'mono': 'mono',
      // Fibra
      'Fibra': 'fibra', 'fibra': 'fibra',
      // Minerais
      'Cálcio': 'ca', 'ca': 'ca',
      'Magnésio': 'mg', 'mg': 'mg',
      'Manganês': 'mn', 'mn': 'mn',
      'Fósforo': 'p', 'p': 'p',
      'Ferro': 'fe', 'fe': 'fe',
      'Sódio': 'na', 'na': 'na',
      'Potássio': 'k', 'k': 'k',
      'Cobre': 'cu', 'cu': 'cu',
      'Zinco': 'zn', 'zn': 'zn',
      // Vitaminas
      'Retinol': 'vit_a', 'RE': 'vit_a', 'Vit A (RAE)': 'vit_a', 'vit_a': 'vit_a',
      'Vit B1': 'b1', 'b1': 'b1',
      'Vit B2': 'b2', 'b2': 'b2',
      'Vit B6': 'b6', 'b6': 'b6',
      'Vit B3': 'b3', 'b3': 'b3',
      'Vit C': 'vit_c', 'vit_c': 'vit_c',
      'Selênio': 'se', 'se': 'se',
      'Vit D': 'vit_d', 'vit_d': 'vit_d',
      'Vit E': 'vit_e', 'vit_e': 'vit_e',
      'Folato (B9)': 'b9', 'b9': 'b9',
      'Vitamina B12': 'b12', 'b12': 'b12',
    };

    const normalized = {...EMPTY_FOOD()};

    Object.entries(f).forEach(([key, val]) => {
      const internalKey = keyMap[key] || key; // usa chave original se não mapeada
      if (internalKey in normalized || internalKey === 'unidade') {
        // Converte strings numéricas com vírgula decimal (ex: "0,84" → 0.84)
        if (typeof val === 'string') {
          const cleaned = val.trim().replace(',', '.');
          const num = parseFloat(cleaned);
          normalized[internalKey] = isNaN(num) ? val : num;
        } else {
          normalized[internalKey] = val;
        }
      }
    });

    return normalized;
  };

  const importJson = () => {
    setJsonError(''); setJsonSuccess('');
    try {
      let parsed = JSON.parse(jsonText);
      if (!Array.isArray(parsed)) parsed = [parsed];

      // Normaliza chaves — aceita qualquer formato
      const normalized = parsed.map(normalizeFood);

      // Valida: deve ter "nome" após normalização
      const invalid = normalized.filter(f => !f.nome || !String(f.nome).trim());
      if (invalid.length > 0) {
        setJsonError(`${invalid.length} item(s) sem campo "nome" (ou "Nome"). Corrija antes de importar.`);
        return;
      }

      // Separa duplicatas de novos
      const toAdd = [];
      const skipped = [];
      normalized.forEach(f => {
        const norm = normName(f.nome);
        const alreadyInCustom = customFoods.some(c => normName(c.nome) === norm);
        const alreadyInBase   = FOODS_RAW.some(b => normName(b.nome) === norm);
        if (alreadyInCustom || alreadyInBase) {
          skipped.push(f.nome);
        } else {
          toAdd.push(f);
        }
      });

      if (toAdd.length > 0) {
        onCustomFoodsChange([...customFoods, ...toAdd]);
      }

      // Monta mensagem de resultado
      let msg = '';
      if (toAdd.length > 0)   msg += `✅ ${toAdd.length} alimento(s) importado(s). `;
      if (skipped.length > 0) msg += `⚠️ ${skipped.length} ignorado(s) por duplicata: ${skipped.slice(0,5).join(', ')}${skipped.length>5?` e mais ${skipped.length-5}...`:'.'} `;
      if (toAdd.length === 0 && skipped.length > 0) {
        setJsonError(`Todos os ${skipped.length} alimento(s) já existem no banco. Nenhum foi importado.`);
        return;
      }

      setJsonSuccess(msg);
      setJsonText('');
    } catch(e) {
      setJsonError('JSON inválido. Verifique a formatação e tente novamente.');
    }
  };

  const [confirmClear, setConfirmClear] = useState(false);

  const clearAll = () => {
    onCustomFoodsChange([]);
    setConfirmClear(false);
    setMode('list');
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(customFoods, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='meus_alimentos.json'; a.click();
    URL.revokeObjectURL(url);
  };

  const inpF = (field) => {
    const f = allFields.find(x => x.k===field);
    return (
      <div style={{display:'flex',flexDirection:'column',gap:3,flex:'1 1 150px'}}>
        <label style={{fontSize:11,color:G.muted}}>{f.l}{f.required&&<span style={{color:G.danger}}> *</span>}</label>
        <input
          type={f.type} step={f.type==='number'?'0.001':undefined}
          value={form[field]}
          onChange={e => { setForm(prev => ({...prev, [field]: f.type==='number' ? e.target.value : e.target.value})); if(field==='nome') setDupWarning(''); }}
          style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none'}}
        />
      </div>
    );
  };

  const JSON_EXAMPLE = JSON.stringify([{
    nome:"Exemplo Alimento", medida:"g",
    ptn_a:0, ptn_v:5, carb:20, sat:1, poli:0.5, mono:0.5,
    fibra:2, ca:10, mg:5, fe:0.5, na:50, k:100,
    vit_c:5, b1:0.1
  }], null, 2);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>

      {/* Cabeçalho da aba */}
      <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14,color:G.text}}>🥦 Banco de Alimentos Personalizado</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button onClick={()=>{setMode('manual');setForm(EMPTY_FOOD());setEditIdx(null);}}
              style={{padding:'6px 14px',background:mode==='manual'?G.accent:G.panel,color:mode==='manual'?'#0f1117':G.text,
                border:`1px solid ${mode==='manual'?G.accent:G.border}`,borderRadius:8,fontSize:12,cursor:'pointer',fontWeight:600}}>
              ✏️ Cadastro manual
            </button>
            <button onClick={()=>{setMode('json');setJsonError('');setJsonSuccess('');}}
              style={{padding:'6px 14px',background:mode==='json'?G.accent:G.panel,color:mode==='json'?'#0f1117':G.text,
                border:`1px solid ${mode==='json'?G.accent:G.border}`,borderRadius:8,fontSize:12,cursor:'pointer',fontWeight:600}}>
              📥 Importar JSON
            </button>
            {customFoods.length > 0 && (
              <>
                <button onClick={exportJson}
                  style={{padding:'6px 14px',background:G.panel,color:G.muted,
                    border:`1px solid ${G.border}`,borderRadius:8,fontSize:12,cursor:'pointer'}}>
                  📤 Exportar JSON
                </button>
                {confirmClear ? (
                  <>
                    <span style={{fontSize:12,color:G.danger}}>Apagar todos os {customFoods.length} alimentos?</span>
                    <button onClick={clearAll}
                      style={{padding:'6px 12px',background:G.danger,border:'none',borderRadius:8,
                        color:'#fff',fontSize:12,cursor:'pointer',fontWeight:700}}>
                      Confirmar
                    </button>
                    <button onClick={()=>setConfirmClear(false)}
                      style={{padding:'6px 10px',background:G.panel,border:`1px solid ${G.border}`,
                        borderRadius:8,color:G.muted,fontSize:12,cursor:'pointer'}}>
                      Cancelar
                    </button>
                  </>
                ) : (
                  <button onClick={()=>setConfirmClear(true)}
                    style={{padding:'6px 14px',background:'none',border:`1px solid ${G.danger}`,
                      borderRadius:8,color:G.danger,fontSize:12,cursor:'pointer'}}>
                    🗑 Limpar tudo
                  </button>
                )}
              </>
            )}
            {mode!=='list' && (
              <button onClick={()=>setMode('list')}
                style={{padding:'6px 14px',background:'none',color:G.muted,border:`1px solid ${G.border}`,borderRadius:8,fontSize:12,cursor:'pointer'}}>
                ← Voltar à lista
              </button>
            )}
          </div>
        </div>

        {/* ── MODO: CADASTRO MANUAL ── */}
        {mode==='manual' && (
          <div>
            <div style={{fontWeight:600,color:G.accent,marginBottom:12,fontSize:13}}>
              {editIdx!==null ? '✏️ Editando alimento' : '➕ Novo alimento'}
            </div>
            {/* Campos principais */}
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inpF('nome')}
              {inpF('medida')}
            </div>
            <div style={{fontWeight:600,fontSize:11,color:G.muted,marginBottom:8,marginTop:4}}>MACRONUTRIENTES — valores por 100g (ou por unidade se medida ≠ g)</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inpF('ptn_a')}{inpF('ptn_v')}{inpF('carb')}
              {inpF('sat')}{inpF('poli')}{inpF('mono')}{inpF('fibra')}
            </div>
            <div style={{fontWeight:600,fontSize:11,color:G.muted,marginBottom:8}}>MINERAIS</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              {inpF('ca')}{inpF('mg')}{inpF('p')}{inpF('fe')}{inpF('na')}{inpF('k')}{inpF('zn')}
            </div>
            <div style={{fontWeight:600,fontSize:11,color:G.muted,marginBottom:8}}>VITAMINAS</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
              {inpF('vit_a')}{inpF('b1')}{inpF('b2')}{inpF('b6')}{inpF('b3')}{inpF('vit_c')}{inpF('se')}{inpF('vit_d')}{inpF('vit_e')}{inpF('b9')}
            </div>
            {dupWarning && (
              <div style={{padding:'8px 12px',background:'#f871711a',border:`1px solid ${G.danger}`,borderRadius:8,
                color:G.danger,fontSize:12,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                ⚠️ {dupWarning}
              </div>
            )}
            <div style={{display:'flex',gap:10}}>
              <button onClick={saveForm} disabled={!form.nome.trim()}
                style={{padding:'9px 24px',background:G.accent,border:'none',borderRadius:8,
                  color:'#0f1117',fontWeight:700,fontSize:13,cursor:form.nome.trim()?'pointer':'not-allowed',
                  opacity:form.nome.trim()?1:0.5}}>
                {editIdx!==null ? '💾 Salvar alterações' : '✅ Adicionar alimento'}
              </button>
              <button onClick={()=>{setMode('list');setForm(EMPTY_FOOD());setEditIdx(null);}}
                style={{padding:'9px 18px',background:'none',border:`1px solid ${G.border}`,borderRadius:8,color:G.muted,fontSize:13,cursor:'pointer'}}>
                Cancelar
              </button>
            </div>
          </div>
        )}

        {/* ── MODO: IMPORTAR JSON ── */}
        {mode==='json' && (
          <div>
            <div style={{fontWeight:600,color:G.accent,marginBottom:8,fontSize:13}}>📥 Importação em massa via JSON</div>
            <div style={{fontSize:12,color:G.muted,marginBottom:12,lineHeight:1.6}}>
              Cole um array JSON com os alimentos. Aceita tanto o formato interno do sistema quanto o formato exportado direto da planilha
              (chaves como <code style={{background:G.panel,padding:'1px 5px',borderRadius:4,color:G.accent}}>Nome</code>, <code style={{background:G.panel,padding:'1px 5px',borderRadius:4,color:G.accent}}>Carbs</code>, <code style={{background:G.panel,padding:'1px 5px',borderRadius:4,color:G.accent}}>Fat</code>, <code style={{background:G.panel,padding:'1px 5px',borderRadius:4,color:G.accent}}>Ptn (A)</code> etc. são reconhecidas automaticamente).
              Apenas o campo nome é obrigatório. Campos omitidos são preenchidos com zero.
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:G.muted,marginBottom:4}}>Exemplo de formato:</div>
              <pre style={{background:G.panel,padding:12,borderRadius:8,fontSize:11,color:G.muted,overflowX:'auto',border:`1px solid ${G.border}`}}>
                {JSON_EXAMPLE}
              </pre>
            </div>
            <textarea
              value={jsonText}
              onChange={e => { setJsonText(e.target.value); setJsonError(''); setJsonSuccess(''); }}
              rows={8}
              placeholder={'Cole o JSON aqui...'}
              style={{width:'100%',padding:'10px 12px',background:G.panel,border:`1px solid ${jsonError?G.danger:G.border}`,
                borderRadius:8,color:G.text,fontSize:12,outline:'none',resize:'vertical',
                boxSizing:'border-box',fontFamily:'monospace'}}
            />
            {jsonError && <div style={{color:G.danger,fontSize:12,marginTop:4}}>❌ {jsonError}</div>}
            {jsonSuccess && <div style={{color:G.accent,fontSize:12,marginTop:4}}>✅ {jsonSuccess}</div>}
            <div style={{display:'flex',gap:10,marginTop:10}}>
              <button onClick={importJson} disabled={!jsonText.trim()}
                style={{padding:'9px 24px',background:G.accent,border:'none',borderRadius:8,
                  color:'#0f1117',fontWeight:700,fontSize:13,cursor:jsonText.trim()?'pointer':'not-allowed',
                  opacity:jsonText.trim()?1:0.5}}>
                📥 Importar
              </button>
              <button onClick={()=>setJsonText(JSON_EXAMPLE)}
                style={{padding:'9px 14px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.muted,fontSize:12,cursor:'pointer'}}>
                Carregar exemplo
              </button>
            </div>
          </div>
        )}

        {/* ── MODO: LISTA ── */}
        {mode==='list' && (
          <div>
            {customFoods.length === 0 ? (
              <div style={{textAlign:'center',padding:'32px 0',color:G.muted,fontSize:13}}>
                <div style={{fontSize:32,marginBottom:8}}>🥗</div>
                Nenhum alimento cadastrado ainda.<br/>
                <span style={{fontSize:12}}>Use "Cadastro manual" ou "Importar JSON" para adicionar.</span>
              </div>
            ) : (
              <>
                <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center'}}>
                  <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="Filtrar alimentos…"
                    style={{flex:1,padding:'7px 12px',background:G.panel,border:`1px solid ${G.border}`,
                      borderRadius:8,color:G.text,fontSize:13,outline:'none'}}/>
                  <span style={{fontSize:12,color:G.muted,whiteSpace:'nowrap'}}>{filtered.length} de {customFoods.length}</span>
                </div>
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead>
                      <tr style={{color:G.muted,borderBottom:`1px solid ${G.border}`}}>
                        <th style={{textAlign:'left',padding:'6px 8px',fontWeight:500}}>Alimento</th>
                        <th style={{textAlign:'left',padding:'6px 8px',fontWeight:500}}>Medida</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Ptn (g)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Carb (g)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Gord (g)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Fibra (g)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',fontWeight:500}}>Kcal*</th>
                        <th style={{padding:'6px 8px'}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((food, idx) => {
                        const realIdx = customFoods.indexOf(food);
                        const ptn = (food.ptn_a||0)+(food.ptn_v||0);
                        const gord = (food.sat||0)+(food.poli||0)+(food.mono||0);
                        const kcalPer = (ptn+food.carb)*4 + gord*9;
                        return (
                          <tr key={idx} style={{borderBottom:`1px solid ${G.border}20`,color:G.text}}>
                            <td style={{padding:'7px 8px',fontWeight:500}}>{food.nome}</td>
                            <td style={{padding:'7px 8px',color:G.muted}}>{food.medida}</td>
                            <td style={{textAlign:'right',padding:'7px 8px'}}>{ptn.toFixed(1)}</td>
                            <td style={{textAlign:'right',padding:'7px 8px'}}>{(food.carb||0).toFixed(1)}</td>
                            <td style={{textAlign:'right',padding:'7px 8px'}}>{gord.toFixed(1)}</td>
                            <td style={{textAlign:'right',padding:'7px 8px'}}>{(food.fibra||0).toFixed(1)}</td>
                            <td style={{textAlign:'right',padding:'7px 8px',color:G.accent}}>{kcalPer.toFixed(0)}</td>
                            <td style={{padding:'7px 8px'}}>
                              <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                                <button onClick={()=>startEdit(food,realIdx)}
                                  style={{padding:'3px 8px',background:G.panel,border:`1px solid ${G.border}`,
                                    borderRadius:5,color:G.muted,fontSize:11,cursor:'pointer'}}>✏️</button>
                                {deleteConfirm===realIdx ? (
                                  <>
                                    <button onClick={()=>deleteFood(realIdx)}
                                      style={{padding:'3px 8px',background:G.danger,border:'none',
                                        borderRadius:5,color:'#fff',fontSize:11,cursor:'pointer',fontWeight:700}}>Confirmar</button>
                                    <button onClick={()=>setDeleteConfirm(null)}
                                      style={{padding:'3px 8px',background:G.panel,border:`1px solid ${G.border}`,
                                        borderRadius:5,color:G.muted,fontSize:11,cursor:'pointer'}}>Cancelar</button>
                                  </>
                                ) : (
                                  <button onClick={()=>setDeleteConfirm(realIdx)}
                                    style={{padding:'3px 8px',background:'none',border:`1px solid ${G.danger}`,
                                      borderRadius:5,color:G.danger,fontSize:11,cursor:'pointer'}}>🗑</button>
                                )}
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <div style={{fontSize:10,color:G.muted,marginTop:6}}>* Kcal calculado por 100g/unidade</div>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

const defaultPatient = () => ({
  id: Date.now(),
  nome: '', objetivo: '',
  peso: 70, altura: 170, idade: 30, sexo: 'M',
  gordura: 20, fa: 1.55,
  tmb_formula: 'mifflin',
  profissional: { nome: '', crn: '', contato: '' },
  meals: [],
  rec1: '', rec2: '',
});

function App() {
  const [patients, setPatients] = useState([defaultPatient()]);
  const [currentId, setCurrentId] = useState(null);
  const [tab, setTab] = useState('tmb');
  const [showProf, setShowProf] = useState(false);
  const [customFoods, setCustomFoods] = useState([]);
  const [syncing, setSyncing] = useState(false);
  const [dbReady, setDbReady] = useState(false);

  // ── Sincronização em tempo real com Firebase ──
  useEffect(() => {
    const unsubs = [];
    const tryInit = () => {
      if (!window.FirestoreSDK || !db) { setTimeout(tryInit, 150); return; }

      // Escuta pacientes
      unsubs.push(FB.onSnapshot('nutriplan', 'patients', data => {
        if (data?.list?.length > 0) {
          setPatients(data.list);
          setCurrentId(prev => prev || data.list[0]?.id || null);
        }
        setDbReady(true);
      }));

      // Se não há dados no Firebase ainda, cria registro inicial
      FB.get('nutriplan', 'patients').then(data => {
        if (!data || !data.list || data.list.length === 0) {
          const p = defaultPatient();
          FB.set('nutriplan', 'patients', { list: [p] });
          setCurrentId(p.id);
        }
        setDbReady(true);
      });

      // Escuta alimentos customizados
      unsubs.push(FB.onSnapshot('nutriplan', 'customFoods', data => {
        if (data?.list) setCustomFoods(data.list);
      }));
    };
    tryInit();
    return () => unsubs.forEach(u => u && u());
  }, []);

  const fbSave = async (collection, docId, data) => {
    setSyncing(true);
    try { await FB.set(collection, docId, data); }
    finally { setSyncing(false); }
  };

  const handleCustomFoodsChange = (foods) => {
    setCustomFoods(foods);
    fbSave('nutriplan', 'customFoods', { list: foods });
  };

  const patient = patients.find(p=>p.id===currentId) || patients[0];

  const save = useCallback((updated) => {
    setPatients(prev => {
      const next = prev.map(p => p.id===updated.id ? updated : p);
      fbSave('nutriplan', 'patients', { list: next });
      return next;
    });
  }, []);

  const upd = (field, val) => save({...patient, [field]:val});
  const updProf = (field, val) => save({...patient, profissional:{...patient.profissional,[field]:val}});

  const tmb = useMemo(() => patient.peso && patient.altura && patient.idade
    ? calcTMB({peso:patient.peso,altura:patient.altura,idade:patient.idade,sexo:patient.sexo,gordura:patient.gordura,fa:patient.fa})
    : null, [patient.peso,patient.altura,patient.idade,patient.sexo,patient.gordura,patient.fa]);

  const targetKcal = tmb ? tmb[patient.tmb_formula] || tmb.mifflin : 2000;

  const addMeal = () => save({...patient, meals:[...patient.meals, {id:Date.now(),nome:`Refeição ${patient.meals.length+1}`,items:[]}]});
  const updateMeal = (m) => save({...patient, meals:patient.meals.map(x=>x.id===m.id?m:x)});
  const deleteMeal = (id) => save({...patient, meals:patient.meals.filter(m=>m.id!==id)});

  const addPatient = () => {
    const p = defaultPatient();
    setPatients(prev => {
      const n = [...prev, p];
      fbSave('nutriplan', 'patients', { list: n });
      return n;
    });
    setCurrentId(p.id);
  };
  const deletePatient = () => {
    if (patients.length<=1) return;
    const next = patients.filter(p=>p.id!==currentId);
    setPatients(next);
    fbSave('nutriplan', 'patients', { list: next });
    setCurrentId(next[0].id);
  };

  const inp = (label,field,type='text',opts={}) => (
    <div style={{display:'flex',flexDirection:'column',gap:4,flex:opts.flex||'1 1 120px'}}>
      <label style={{fontSize:11,color:G.muted,fontWeight:500}}>{label}</label>
      <input type={type} value={patient[field]||''} onChange={e=>upd(field,type==='number'?parseFloat(e.target.value)||0:e.target.value)}
        style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none'}}
        {...opts}/>
    </div>
  );

  const FA_OPTS = [
    {v:1.2,l:'Sedentário (1.2)'},{v:1.375,l:'Pouco ativo (1.375)'},
    {v:1.55,l:'Mod. ativo (1.55)'},{v:1.725,l:'Muito ativo (1.725)'},{v:1.9,l:'Extremamente ativo (1.9)'}
  ];

  const TMB_FMLS = [
    {k:'mifflin',l:'Mifflin-St Jeor',desc:'Melhor para emagrecimento'},
    {k:'harris',l:'Harris-Benedict',desc:'Clássica, crescimento muscular'},
    {k:'tinsley_p',l:'Tinsley (peso)',desc:'Atletas (considera peso)'},
    {k:'tinsley_mlg',l:'Tinsley (MLG)',desc:'Atletas (considera MLG)'},
    {k:'cunningham',l:'Cunningham',desc:'Atletas (baixo % gordura)'},
  ];

  if (!dbReady) return (
    <div style={{minHeight:'100vh',background:G.bg,display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:16,fontFamily:'sans-serif'}}>
      <div style={{width:36,height:36,border:'3px solid #2a3050',borderTopColor:'#4ade80',
        borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:'#4ade80',fontSize:16,fontWeight:700}}>NutriPlan Pro</div>
      <div style={{color:'#7c85a2',fontSize:13}}>Conectando ao Firebase…</div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:G.bg,color:G.text,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      {/* Barra superior */}
      <div style={{background:G.panel,borderBottom:`1px solid ${G.border}`,padding:'0 16px',display:'flex',alignItems:'center',gap:12,height:48,position:'sticky',top:0,zIndex:50}}>
        <span style={{fontWeight:900,fontSize:15,background:G.grad,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'-0.5px'}}>
          NutriPlan Pro
        </span>
        {syncing && (
          <span style={{fontSize:10,color:G.muted,display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:G.accent,display:'inline-block',animation:'pulse 1s infinite'}}/>
            salvando…
          </span>
        )}
        {!syncing && dbReady && (
          <span style={{fontSize:10,color:G.accent,display:'flex',alignItems:'center',gap:4}}>☁️ sincronizado</span>
        )}
        <div style={{flex:1,display:'flex',gap:4,overflowX:'auto'}}>
          {patients.map(p=>(
            <button key={p.id} onClick={()=>setCurrentId(p.id)}
              style={{padding:'4px 12px',borderRadius:6,border:'none',fontSize:12,cursor:'pointer',whiteSpace:'nowrap',
                background:p.id===currentId?G.accent:G.card,color:p.id===currentId?'#0f1117':G.muted,fontWeight:p.id===currentId?700:400}}>
              {p.nome||'Novo Paciente'}
            </button>
          ))}
          <button onClick={addPatient} style={{padding:'4px 10px',borderRadius:6,border:`1px dashed ${G.border}`,background:'none',color:G.muted,fontSize:12,cursor:'pointer'}}>+ Paciente</button>
        </div>
        <button onClick={()=>setShowProf(!showProf)} style={{padding:'4px 10px',background:G.card,border:`1px solid ${G.border}`,borderRadius:6,color:G.muted,fontSize:12,cursor:'pointer'}}>
          ⚙ Profissional
        </button>
      </div>

      {/* Modal profissional */}
      {showProf && (
        <div style={{position:'fixed',inset:0,background:'#000000aa',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:G.panel,borderRadius:16,padding:24,width:320,border:`1px solid ${G.border}`}}>
            <div style={{fontWeight:700,marginBottom:16}}>Dados do Profissional</div>
            {['nome','crn','contato'].map(f=>(
              <div key={f} style={{marginBottom:10}}>
                <label style={{fontSize:11,color:G.muted}}>{f.toUpperCase()}</label>
                <input value={patient.profissional[f]||''} onChange={e=>updProf(f,e.target.value)}
                  style={{width:'100%',marginTop:4,padding:'7px 10px',background:G.card,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none',boxSizing:'border-box'}}/>
              </div>
            ))}
            <button onClick={()=>setShowProf(false)} style={{width:'100%',padding:'8px',background:G.accent,border:'none',borderRadius:8,fontWeight:700,color:'#0f1117',cursor:'pointer',marginTop:4}}>Fechar</button>
          </div>
        </div>
      )}

      {/* Tabs — sticky abaixo da navbar */}
      <div style={{position:'sticky',top:48,zIndex:40,background:G.bg,borderBottom:`1px solid ${G.border}`}}>
        <div style={{maxWidth:960,margin:'0 auto',padding:'0 12px',display:'flex',gap:4}}>
          {[{k:'tmb',l:'📐 Avaliação'},{k:'diet',l:'🍽 Plano Alimentar'},{k:'summary',l:'📊 Resumo'},{k:'foods',l:'🥦 Alimentos'}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              style={{padding:'10px 18px',background:'none',border:'none',
                borderBottom:tab===t.k?`2px solid ${G.accent}`:'2px solid transparent',
                color:tab===t.k?G.accent:G.muted,fontWeight:tab===t.k?700:400,
                cursor:'pointer',fontSize:13,transition:'color .15s'}}>
              {t.l}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:960,margin:'0 auto',padding:'16px 12px'}}>

        {/* ABA: Avaliação */}
        {tab==='tmb' && (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
              <div style={{fontWeight:700,marginBottom:12,fontSize:13,color:G.accent}}>👤 Dados do Paciente</div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
                {inp('Nome','nome')}
                {inp('Objetivo','objetivo')}
              </div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
                {inp('Peso (kg)','peso','number')}
                {inp('Altura (cm)','altura','number')}
                {inp('Idade','idade','number')}
                <div style={{display:'flex',flexDirection:'column',gap:4,flex:'1 1 80px'}}>
                  <label style={{fontSize:11,color:G.muted}}>Sexo</label>
                  <select value={patient.sexo} onChange={e=>upd('sexo',e.target.value)}
                    style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none'}}>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                  </select>
                </div>
                {inp('% Gordura','gordura','number')}
              </div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                <div style={{flex:'1 1 200px',display:'flex',flexDirection:'column',gap:4}}>
                  <label style={{fontSize:11,color:G.muted}}>Fator de Atividade (FA)</label>
                  <input
                    type="number" step="0.01" min="1" max="2.5"
                    value={patient.fa}
                    onChange={e => upd('fa', parseFloat(e.target.value) || 1)}
                    style={{padding:'7px 10px',background:G.panel,border:`1px solid ${G.border}`,
                      borderRadius:8,color:G.text,fontSize:13,outline:'none'}}
                  />
                  <div style={{fontSize:10,color:G.muted,lineHeight:1.7,marginTop:2}}>
                    {FA_OPTS.map(o => (
                      <div key={o.v} style={{display:'flex',gap:6,cursor:'pointer'}}
                        onClick={() => upd('fa', o.v)}>
                        <span style={{color:G.accent,minWidth:34}}>{o.v}</span>
                        <span>{o.l.split('(')[0].trim()}</span>
                      </div>
                    ))}
                  </div>
                </div>
                {tmb && (
                  <div style={{flex:'1 1 200px',display:'flex',gap:8,alignItems:'center',padding:'8px 12px',background:G.panel,borderRadius:8,border:`1px solid ${G.border}`}}>
                    <div>
                      <div style={{fontSize:11,color:G.muted}}>Massa Magra</div>
                      <div style={{fontWeight:700,color:G.accent}}>{tmb.mlg}kg</div>
                    </div>
                    <div style={{width:1,height:30,background:G.border}}/>
                    <div>
                      <div style={{fontSize:11,color:G.muted}}>Massa Gorda</div>
                      <div style={{fontWeight:700,color:G.warn}}>{tmb.mgorda}kg</div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Fórmulas TMB */}
            {tmb && (
              <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
                <div style={{fontWeight:700,marginBottom:12,fontSize:13,color:G.accent}}>🔥 Taxa Metabólica Basal (GCD = TMB × FA)</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:10}}>
                  {TMB_FMLS.map(f=>(
                    <div key={f.k} onClick={()=>upd('tmb_formula',f.k)} style={{
                      padding:12,borderRadius:10,border:`2px solid ${patient.tmb_formula===f.k?G.accent:G.border}`,
                      cursor:'pointer',background:patient.tmb_formula===f.k?`${G.accent}15`:G.panel,transition:'all .2s'}}>
                      <div style={{fontSize:11,color:G.muted,marginBottom:4}}>{f.l}</div>
                      <div style={{fontSize:22,fontWeight:900,color:patient.tmb_formula===f.k?G.accent:G.text}}>{tmb[f.k]}</div>
                      <div style={{fontSize:10,color:G.muted}}>kcal/dia</div>
                      <div style={{fontSize:10,color:G.muted,marginTop:4}}>{f.desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <button onClick={deletePatient} disabled={patients.length<=1}
              style={{alignSelf:'flex-start',padding:'6px 14px',background:'none',border:`1px solid ${G.danger}`,borderRadius:8,color:G.danger,fontSize:12,cursor:'pointer',opacity:patients.length<=1?0.3:1}}>
              🗑 Excluir paciente
            </button>
          </div>
        )}

        {/* ABA: Plano Alimentar */}
        {tab==='diet' && (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <label style={{fontSize:11,color:G.muted,fontWeight:500}}>Recomendações iniciais</label>
              <textarea value={patient.rec1||''} onChange={e=>upd('rec1',e.target.value)} rows={3}
                placeholder="Orientações para o paciente…"
                style={{width:'100%',marginTop:4,padding:'10px 12px',background:G.card,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none',resize:'vertical',boxSizing:'border-box'}}/>
            </div>
            {patient.meals.map(m=>(
              <MealTable key={m.id} meal={m} onChange={updateMeal} onDelete={()=>deleteMeal(m.id)} weight={patient.peso} customFoods={customFoods}/>
            ))}
            <button onClick={addMeal}
              style={{padding:'10px',background:G.card,border:`1px dashed ${G.border}`,borderRadius:10,color:G.muted,cursor:'pointer',fontSize:13,transition:'all .2s'}}>
              + Adicionar Refeição
            </button>
            <div>
              <label style={{fontSize:11,color:G.muted,fontWeight:500}}>Recomendações adicionais</label>
              <textarea value={patient.rec2||''} onChange={e=>upd('rec2',e.target.value)} rows={3}
                placeholder="Orientações complementares…"
                style={{width:'100%',marginTop:4,padding:'10px 12px',background:G.card,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontSize:13,outline:'none',resize:'vertical',boxSizing:'border-box'}}/>
            </div>
          </div>
        )}

        {/* ABA: Resumo */}
        {tab==='summary' && (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Summary meals={patient.meals} targetKcal={targetKcal} weight={patient.peso}/>
            {/* Tabela por refeição */}
            {patient.meals.length > 0 && (
              <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:16}}>
                <div style={{fontWeight:700,color:G.text,marginBottom:12,fontSize:13}}>🗓 Distribuição por Refeição</div>
                <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
                  <thead><tr style={{color:G.muted,borderBottom:`1px solid ${G.border}`}}>
                    <th style={{textAlign:'left',padding:'4px 0',fontWeight:500}}>Refeição</th>
                    <th style={{textAlign:'right',fontWeight:500}}>Kcal</th>
                    <th style={{textAlign:'right',fontWeight:500}}>Ptn(A)</th>
                    <th style={{textAlign:'right',fontWeight:500}}>Ptn(V)</th>
                    <th style={{textAlign:'right',fontWeight:500}}>Carb</th>
                    <th style={{textAlign:'right',fontWeight:500}}>Gord</th>
                    <th style={{textAlign:'right',fontWeight:500}}>Fibra</th>
                  </tr></thead>
                  <tbody>
                    {patient.meals.map(m=>{
                      const t = {kcal:0,ptn_a:0,ptn_v:0,carb:0,sat:0,poli:0,mono:0,fibra:0};
                      m.items.forEach(({food,qtd})=>{
                        t.kcal+=calcKcal(food,qtd);
                        ['ptn_a','ptn_v','carb','sat','poli','mono','fibra'].forEach(k=>t[k]+=calcNutriente(food,qtd,k));
                      });
                      return (
                        <tr key={m.id} style={{borderBottom:`1px solid ${G.border}30`,color:G.text}}>
                          <td style={{padding:'5px 0'}}>{m.nome}</td>
                          <td style={{textAlign:'right',color:G.accent,fontWeight:600}}>{t.kcal.toFixed(0)}</td>
                          <td style={{textAlign:'right'}}>{t.ptn_a.toFixed(1)}g</td>
                          <td style={{textAlign:'right'}}>{t.ptn_v.toFixed(1)}g</td>
                          <td style={{textAlign:'right'}}>{t.carb.toFixed(1)}g</td>
                          <td style={{textAlign:'right'}}>{(t.sat+t.poli+t.mono).toFixed(1)}g</td>
                          <td style={{textAlign:'right'}}>{t.fibra.toFixed(1)}g</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}

            {/* ── TEMPLATE DE IMPRESSÃO (fiel à aba Template da planilha) ── */}
            {patient.meals.length > 0 && (
              <PrintTemplate patient={patient} targetKcal={targetKcal} />
            )}
          </div>
        )}

        {/* ABA: Alimentos */}
        {tab==='foods' && (
          <FoodManager customFoods={customFoods} onCustomFoodsChange={handleCustomFoodsChange} />
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
